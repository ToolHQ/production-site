apiVersion: beat.k8s.elastic.co/v1beta1
kind: Beat
metadata:
  name: oci-filebeat
  namespace: elastic-system
spec:
  type: filebeat
  version: 8.11.0
  config:
    filebeat.autodiscover:
      providers:
        - type: kubernetes
          node: ${NODE_NAME}
          hints.enabled: true
          hints.default_config:
            type: container
            paths:
              - /var/log/containers/*${data.kubernetes.container.id}.log
    output.logstash:
      hosts: ["oci-logstash-ls-beats:5044"]
  daemonSet:
    podTemplate:
      spec:
        imagePullSecrets:
        - name: regcred
        dnsPolicy: ClusterFirstWithHostNet
        hostNetwork: true
        securityContext:
          runAsUser: 0
        serviceAccountName: oci-filebeat
        automountServiceAccountToken: true
        containers:
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.11.0
          securityContext:
            runAsUser: 0
          volumeMounts:
          - name: varlogcontainers
            mountPath: /var/log/containers
          - name: varlogpods
            mountPath: /var/log/pods
          - name: varlibdockercontainers
            mountPath: /var/lib/docker/containers
          env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 20m
              memory: 50Mi
            limits:
              cpu: 100m
              memory: 300Mi
        volumes:
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oci-filebeat
subjects:
- kind: ServiceAccount
  name: oci-filebeat
  namespace: elastic-system
roleRef:
  kind: ClusterRole
  name: oci-filebeat
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: oci-filebeat
rules:
- apiGroups: [""]
  resources:
  - namespaces
  - pods
  - nodes
  - events
  verbs:
  - get
  - watch
  - list
- apiGroups: ["apps"]
  resources:
  - replicasets
  verbs:
  - get
  - list
  - watch
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oci-filebeat
  namespace: elastic-system

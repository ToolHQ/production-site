apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: coroot
  labels:
    app: clickhouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
      - name: clickhouse
        image: clickhouse/clickhouse-server:24.3
        ports:
        - containerPort: 8123
          name: http
        - containerPort: 9000
          name: native
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        volumeMounts:
        - name: data
          mountPath: /var/lib/clickhouse
        - name: users-config
          mountPath: /etc/clickhouse-server/users.d
      volumes:
      - name: data
        emptyDir: {}
      - name: users-config
        configMap:
          name: clickhouse-users-config

apiVersion: v1
kind: Namespace
metadata:
  labels:
    kubernetes.io/metadata.name: minio
    name: minio
  name: minio
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: minio
  labels:
    app: minio
type: Opaque
data:
  MINIO_ROOT_USER: bWluaW8=
  MINIO_ROOT_PASSWORD: bWluaW80NTY=
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: minio-pv
  namespace: minio
  labels:
    type: minio
    app: minio
spec:
  storageClassName: manual
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/minio
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: minio
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # volumeMode: Filesystem
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: minio
  name: minio-deployment
  namespace: minio
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: minio
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 50%
  minReadySeconds: 0
  template:
    metadata:
      labels:
        app: minio
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-pvc
      nodeSelector:
        kubernetes.io/hostname: k8s-master
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        # - name: object-browser
        #   image: openmaxio-object-browser:1.1.0
        #   imagePullPolicy: Never
        #   env:
        #     - name: BROWSER_ENDPOINT
        #       value: "http://localhost:9000"
        #     - name: BROWSER_ACCESS_KEY
        #       value: 1GPKUnZroHykGLfvZNjD
        #     - name: BROWSER_SECRET_KEY
        #       value: I1QtddzvJ5iA9M8DcP7copb6tDfBU7l0oWGPANkl
        #     - name: CONSOLE_PBKDF_PASSPHRASE
        #       value: SECRET
        #     - name: CONSOLE_PBKDF_SALT
        #       value: SECRET
        #     - name: CONSOLE_MINIO_SERVER
        #       value: http://localhost:9000
        #   ports:
        #     - containerPort: 9090
        #   resources:
        #     requests:
        #       cpu: 50m
        #       memory: 64Mi
        #     limits:
        #       cpu: 200m
        #       memory: 256Mi
        - name: minio
          image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
          # image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
          command:
            - /bin/bash
            - -c
          args:
            - minio server /data --console-address :9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              cpu: 500m
              memory: 1Gi
          ports:
            - containerPort: 9000
              protocol: TCP
            - containerPort: 9001
              protocol: TCP
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /data
              name: data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: minio-service
  namespace: minio
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      nodePort: 30900
    - name: open-max-object-browser
      port: 8080
      targetPort: 9090
      nodePort: 30080
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
  type: NodePort
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-ingress
  namespace: minio
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
    nginx.ingress.kubernetes.io/proxy-body-size: 800m
spec:
  ingressClassName: nginx
  rules:
    - host: minio.dnor.io
      http:
        paths:
          - path: /
            backend:
              service:
                name: minio-service
                port:
                  number: 9000
            pathType: Prefix
    - host: minio-browser.dnor.io
      http:
        paths:
          - path: /
            backend:
              service:
                name: minio-service
                port:
                  number: 8080
            pathType: Prefix
    - host: minio-console.dnor.io
      http:
        paths:
          - path: /
            backend:
              service:
                name: minio-service
                port:
                  number: 9001
            pathType: Prefix
  tls:
    - hosts:
        - minio.dnor.io
        - minio-browser.dnor.io
        - minio-console.dnor.io
      secretName: minio-ingress-tls
---
# Idempotent bootstrap: creates bucket 'my-site' and sets public-read on static/*
# Re-run safely: mc mb --ignore-existing and mc anonymous set are idempotent
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bootstrap-buckets
  namespace: minio
  annotations:
    description: "Provisionamento idempotente do bucket my-site com policy public-read em static/*"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio-service.minio.svc.cluster.local:9000 \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" && \
              mc mb --ignore-existing local/my-site && \
              mc anonymous set download local/my-site/static/ && \
              echo "Bootstrap complete."
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: v1
kind: Namespace
metadata:
  name: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: postgres
  labels:
    app: postgres
type: Opaque
data:
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: Q0hBVkVfUkVNT1ZJREFfUE9SX1NFR1VSQU5DQQ== # Gerenciado via TUI
  POSTGRES_REPLICATION_PASSWORD: Q0hBVkVfUkVNT1ZJREFfUE9SX1NFR1VSQU5DQQ== # Gerenciado via TUI

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: postgres
  labels:
    app: postgres
spec:
  serviceName: "postgres-internal"
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        container.apparmor.security.beta.kubernetes.io/postgres: unconfined
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - postgres
              topologyKey: "kubernetes.io/hostname"
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - ingress-nginx
              topologyKey: "kubernetes.io/hostname"
      imagePullSecrets:
        - name: regsecret
      volumes:
        - name: postgres-entrypoint
          configMap:
            name: postgres-entrypoint
            defaultMode: 493
      containers:
        - name: postgres
          # Custom Image from Nexus (registry.local:31444)
          image: registry.local:31444/repository/docker-repo/postgres:16.11-alpine3.23-31c419b
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
              ephemeral-storage: 1Gi
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PG_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_REPLICATION_PASSWORD
            - name: PG_HOST
              value: postgres
            - name: POSTGRES_LISTEN_ADDRESSES
              value: "*"
            # Default Data Directory (User requested /18/docker subpath)
            # IMPORTANT: For StatefulSet, we mount to the ROOT of the PVC usually, or subpath.
            # Entrypoint wrapper expects PGDATA to be the data dir.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-entrypoint
              mountPath: /usr/local/bin/entrypoint-wrapper.sh
              subPath: entrypoint-wrapper.sh
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          startupProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "template1"]
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "template1"]
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "template1"]
            initialDelaySeconds: 0
            periodSeconds: 20
            timeoutSeconds: 5
      restartPolicy: Always
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: "longhorn"
        resources:
          requests:
            storage: 2152Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-internal
  namespace: postgres
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: tcp-port
      port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: postgres
  labels:
    app: postgres
spec:
  type: ClusterIP
  # Writes must hit the primary only (postgres-0). Including postgres-1 (hot standby)
  # caused intermittent "cannot execute UPDATE in a read-only transaction" for clients
  # that resolve postgres-service to the replica endpoint.
  selector:
    app: postgres
    statefulset.kubernetes.io/pod-name: postgres-0
  ports:
    - name: tcp-port
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# TCP Ingress Configuration for PostgreSQL
# This ConfigMap configures NGINX Ingress Controller to expose PostgreSQL on TCP port 5432
apiVersion: v1
kind: ConfigMap
metadata:
  name: tcp-services
  namespace: ingress-nginx
data:
  "5433": "postgres/postgres-service:5432"

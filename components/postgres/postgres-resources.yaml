---
apiVersion: v1
kind: Namespace
metadata:
  name: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: postgres
  labels:
    app: postgres
type: Opaque
data:
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: cGFzc3dvcmRpbml0aWFs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: postgres
  labels:
    app: postgres
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2.1Gi  # Matches existing volume
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: postgres
  labels:
    app: postgres
spec:
  serviceName: "postgres-internal"
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        container.apparmor.security.beta.kubernetes.io/postgres: unconfined
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - postgres
              topologyKey: "kubernetes.io/hostname"
      imagePullSecrets:
        - name: regsecret
      containers:
        - name: postgres
          # Custom Image from Nexus (registry.local:31444)
          image: registry.local:31444/repository/docker-repo/postgres:16-alpine-6d98ea7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PG_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_REPLICATION_PASSWORD
            - name: PG_HOST
              value: postgres
            - name: POSTGRES_LISTEN_ADDRESSES
              value: "*"
            # Default Data Directory (User requested /18/docker subpath)
            # IMPORTANT: For StatefulSet, we mount to the ROOT of the PVC usually, or subpath.
            # Entrypoint wrapper expects PGDATA to be the data dir.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          # Startup Probe: Gives time for pg_basebackup to finish (up to 5 mins)
          startupProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "template1"]
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe: # ✅ adds safe startup check
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "template1"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "template1"]
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
      restartPolicy: Always
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: "longhorn"
        resources:
          requests:
            storage: 2.1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-internal
  namespace: postgres
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: tcp-port
      port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: postgres
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: tcp-port
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# TCP Ingress Configuration for PostgreSQL
# This ConfigMap configures NGINX Ingress Controller to expose PostgreSQL on TCP port 5432
apiVersion: v1
kind: ConfigMap
metadata:
  name: tcp-services
  namespace: ingress-nginx
data:
  # Format: "<external-port>": "<namespace>/<service>:<internal-port>"
  "5432": "postgres/postgres-service:5432"

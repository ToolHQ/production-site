kubecostModel:
  resources:
    requests:
      cpu: 100m
      memory: 400Mi
    limits:
      cpu: 300m
      memory: 600Mi

kubecostFrontend:
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

persistentVolume:
  size: 2Gi

prometheus:
  server:
    persistentVolume:
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 512Mi
    retention: 5d # Reduce retention to save disk space if configured
  nodeExporter:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi

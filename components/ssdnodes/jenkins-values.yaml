# Jenkins — SSDNodes CI (T-341 / T-342 / T-343)
# Ingress externo: jenkins-ingress.yaml | TLS via cert-manager
# Helm chart pin: 5.9.22 | imagem 2.567-slim-jdk25
#
# T-343: jenkinsUrl obrigatório quando ingress.enabled=false (reverse proxy test)

controller:
  componentName: jenkins-controller
  numExecutors: 0
  executorMode: "NORMAL"
  image:
    tag: "2.567-slim-jdk25"
  jenkinsUrl: "https://jenkins.ssdnodes.dnor.io/"
  jenkinsAdminEmail: "ci@dnor.io"
  disableRememberMe: true
  enableRawHtmlMarkupFormatter: false
  markupFormatter: plainText
  initScripts:
    security-csp: |-
      System.setProperty("hudson.model.DirectoryBrowserSupport.CSP", "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;");
  admin:
    createSecret: true
    username: admin
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  serviceType: ClusterIP
  agentListenerServiceType: ClusterIP
  installPlugins:
    - kubernetes
    - git
    - workflow-aggregator
    - configuration-as-code
    - sonar
  additionalExistingSecrets:
    - name: jenkins-ci-credentials
      keyName: sonar-token
    - name: jenkins-ci-credentials
      keyName: github-pat
  JCasC:
    defaultConfig: true
    configScripts:
      ci-platform: |
        unclassified:
          sonarGlobalConfiguration:
            buildWrapperEnabled: false
            installations:
              - name: SonarQube SSDNodes
                serverUrl: https://sonar.ssdnodes.dnor.io
                credentialsId: sonar-token
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - string:
                      scope: GLOBAL
                      id: sonar-token
                      description: SonarQube CI (citools)
                      secret: ${jenkins-ci-credentials-sonar-token}
                  - usernamePassword:
                      scope: GLOBAL
                      id: github-pat
                      description: GitHub PAT (repo read)
                      username: git
                      password: ${jenkins-ci-credentials-github-pat}
    securityRealm: |-
      local:
        allowsSignup: false
        users:
        - id: "${chart-admin-username}"
          name: "Jenkins Admin"
          password: "${chart-admin-password}"
    authorizationStrategy: |-
      loggedInUsersCanDoAnything:
        allowAnonymousRead: false
  ingress:
    enabled: false

agent:
  enabled: true
  containerCap: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

persistence:
  enabled: true
  storageClass: local-path
  size: 20Gi

rbac:
  create: true

networkPolicy:
  enabled: false

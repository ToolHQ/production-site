# Jenkins — SSDNodes CI (T-341 / T-342)
# Ingress externo: jenkins-ingress.yaml | TLS via cert-manager
# Helm chart pin: 5.9.22 | imagem 2.567-slim-jdk25

controller:
  componentName: jenkins-controller
  numExecutors: 0
  executorMode: "NORMAL"
  image:
    tag: "2.567-slim-jdk25"
  admin:
    createSecret: true
    username: admin
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  serviceType: ClusterIP
  agentListenerServiceType: ClusterIP
  installPlugins:
    - kubernetes
    - git
    - workflow-aggregator
    - configuration-as-code
    - sonar
  additionalExistingSecrets:
    - name: jenkins-ci-credentials
      keyName: sonar-token
    - name: jenkins-ci-credentials
      keyName: github-pat
  JCasC:
    defaultConfig: true
    configScripts:
      ci-platform: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - string:
                      scope: GLOBAL
                      id: sonar-token
                      description: SonarQube CI (citools)
                      secret: ${jenkins-ci-credentials-sonar-token}
                  - usernamePassword:
                      scope: GLOBAL
                      id: github-pat
                      description: GitHub PAT (repo read)
                      username: git
                      password: ${jenkins-ci-credentials-github-pat}
        unclassified:
          sonarGlobalConfiguration:
            buildWrapperEnabled: false
            installations:
              - name: SonarQube SSDNodes
                serverUrl: https://sonar.ssdnodes.dnor.io
                credentialsId: sonar-token
    securityRealm: |-
      local:
        allowsSignup: false
        users:
        - id: "${chart-admin-username}"
          name: "Jenkins Admin"
          password: "${chart-admin-password}"
    authorizationStrategy: |-
      loggedInUsersCanDoAnything:
        allowAnonymousRead: false
  ingress:
    enabled: false

agent:
  enabled: true
  containerCap: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

persistence:
  enabled: true
  storageClass: local-path
  size: 20Gi

rbac:
  create: true

networkPolicy:
  enabled: false

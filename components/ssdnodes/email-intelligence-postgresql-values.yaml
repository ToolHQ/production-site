# PostgreSQL — email intelligence (T-362a) — Bitnami chart
# ClusterIP only | namespace email-intelligence
# Schema: components/ssdnodes/n8n/schema/ (Job migrate)

image:
  registry: docker.io
  repository: bitnamilegacy/postgresql
  tag: 16.4.0-debian-12-r14

auth:
  username: email_intel_migrator
  database: email_intel
  existingSecret: email-intelligence-db-credentials
  secretKeys:
    adminPasswordKey: postgres-password
    userPasswordKey: migrator-password

primary:
  persistence:
    enabled: true
    storageClass: local-path
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  service:
    type: ClusterIP

metrics:
  enabled: false

# pipeline.yaml — stages CI production-site (citools)
# Jenkins/GHA/local: citools run-all --pipeline components/ssdnodes/jenkins/pipeline.yaml
#
# Evolução: cada stage pode migrar de `run: shell` para subcomando nativo citools.

version: 1
name: production-site-default

stages:
  - id: plan
    description: Dry-run — imprime plano de execução
    run: citools plan --pipeline components/ssdnodes/jenkins/pipeline.yaml

  - id: verify-changed
    description: Harness path-aware (shell gates — T-141)
    run: ./tools/harness/verify.sh verify-changed

  - id: validate-ssdnodes-ci
    description: Smoke TLS Sonar/Jenkins no SSDNodes
    when: env:VALIDATE_SSDNODES_CI
    run: ./scripts/harness/validate_ssdnodes_ci.sh

  - id: sonar-scan
    description: SonarQube scanner (requer SONAR_TOKEN + sonar-scanner no agent)
    when: env:SONAR_TOKEN
    run: ./tools/citools/scripts/sonar-scan.sh

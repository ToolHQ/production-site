# Fragmento JCasC — montado via jenkins-values.yaml (T-341)
# Tokens: Secret jenkins-ci-credentials → ${jenkins-ci-credentials-<key>}

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: sonar-token
              description: SonarQube CI (citools)
              secret: ${jenkins-ci-credentials-sonar-token}
          - string:
              scope: GLOBAL
              id: github-pat
              description: GitHub PAT (repo read)
              secret: ${jenkins-ci-credentials-github-pat}

unclassified:
  sonarGlobalConfiguration:
    buildWrapperEnabled: false
    installations:
      - name: SonarQube SSDNodes
        serverUrl: https://sonar.ssdnodes.dnor.io
        credentialsId: sonar-token

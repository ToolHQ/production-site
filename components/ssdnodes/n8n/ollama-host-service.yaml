---
# In-cluster proxy → host socat bridge (T-362c). Rewrites Host for OLLAMA_HOST=127.0.0.1.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-host-proxy
  namespace: n8n
data:
  default.conf: |
    server {
      listen 11434;
      location / {
        proxy_pass http://104.225.218.78:11434;
        proxy_set_header Host 127.0.0.1;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-host
  namespace: n8n
  labels:
    app: ollama-host
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-host
  template:
    metadata:
      labels:
        app: ollama-host
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: ollama-host-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-host
  namespace: n8n
  labels:
    app: ollama-host
spec:
  type: ClusterIP
  selector:
    app: ollama-host
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      protocol: TCP

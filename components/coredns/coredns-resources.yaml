apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns
  namespace: kube-system
spec:
  template:
    spec:
      containers:
      - name: coredns
        resources:
          requests:
            cpu: 25m  # was 50m — actual usage ~3m (T-103)
            memory: 64Mi
          limits:
            cpu: 150m
            memory: 128Mi

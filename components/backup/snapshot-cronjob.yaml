---
# Automated Snapshot CronJob Template
# Creates snapshots every 6 hours with automatic retention cleanup
# 
# Configuration:
# - Schedule: 0 */6 * * * (every 6 hours)
# - Retention: Keep last 7 snapshots
# - Target: postgres-data-postgres-0 in postgres namespace
# Important:
# - Longhorn exposes these CSI snapshots with `bak://...` handles.
# - Each retained snapshot therefore creates a Longhorn backup object in backupstore.
# - This job intentionally gives postgres-primary a denser restore window than `backup-daily`.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-auto-snapshot
  namespace: postgres
  labels:
    app: postgres
    component: backup
    type: automated-snapshot
spec:
  schedule: "0 */6 * * *"  # Every 6 hours at minute 0
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid  # Don't run if previous job still running
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: postgres
            component: backup-job
        spec:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          serviceAccountName: snapshot-creator
          restartPolicy: OnFailure
          containers:
          - name: snapshot-creator
            # bitnami/kubectl:1.28 no longer resolves on Docker Hub; use the same
            # working image family already proven by the chain-repair CronJob.
            image: bitnami/kubectl:latest
            env:
            - name: PVC_NAME
              value: "postgres-data-postgres-0"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RETENTION_COUNT
              value: "7"  # Keep last 7 automated snapshots
            command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              K=(kubectl --server=https://10.0.1.100:6443 --token="$TOKEN" --certificate-authority="$CA")
              
              echo "=== Automated Snapshot Creator ==="
              echo "PVC: $PVC_NAME"
              echo "Namespace: $NAMESPACE"
              echo "Retention: $RETENTION_COUNT snapshots"
              echo ""
              
              # 1. Create snapshot with timestamp
              SNAPSHOT_NAME="auto-$(date +%Y%m%d-%H%M%S)"
              TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S UTC')
              
              echo "📸 Creating snapshot: $SNAPSHOT_NAME"
              
              cat <<EOF | "${K[@]}" create --validate=false -f -
              apiVersion: snapshot.storage.k8s.io/v1
              kind: VolumeSnapshot
              metadata:
                name: $SNAPSHOT_NAME
                namespace: $NAMESPACE
                annotations:
                  snapshot.longhorn.io/display-name: "Auto Snapshot"
                  snapshot.longhorn.io/description: "Automated snapshot created at $TIMESTAMP"
                labels:
                  snapshot-type: "automated"
                  created-by: "cronjob"
                  pvc-source: "$PVC_NAME"
              spec:
                volumeSnapshotClassName: longhorn-snapshot-vsc  # Backup-backed Longhorn CSI snapshots
                source:
                  persistentVolumeClaimName: $PVC_NAME
              EOF
              
              echo "⏳ Waiting for snapshot to be ready..."
              "${K[@]}" wait --for=jsonpath='{.status.readyToUse}'=true \
                volumesnapshot/$SNAPSHOT_NAME -n $NAMESPACE --timeout=10m
              
              echo "✅ Snapshot $SNAPSHOT_NAME is ready"
              
              # 2. Apply retention policy (cleanup old snapshots)
              echo ""
              echo "🧹 Applying retention policy (keep last $RETENTION_COUNT)..."
              
              # Get all automated snapshots sorted by creation time (oldest first)
              SNAPSHOTS=$("${K[@]}" get volumesnapshot -n $NAMESPACE \
                -l snapshot-type=automated,pvc-source=$PVC_NAME \
                --sort-by=.metadata.creationTimestamp \
                -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}')
              
              # Convert to array
              SNAPSHOT_ARRAY=($SNAPSHOTS)
              TOTAL=${#SNAPSHOT_ARRAY[@]}
              
              echo "Total automated snapshots: $TOTAL"
              
              if [ $TOTAL -gt $RETENTION_COUNT ]; then
                DELETE_COUNT=$((TOTAL - RETENTION_COUNT))
                echo "💥 Deleting $DELETE_COUNT old snapshot(s)..."
                
                for ((i=0; i<$DELETE_COUNT; i++)); do
                  OLD_SNAP="${SNAPSHOT_ARRAY[$i]}"
                  echo "  - Deleting: $OLD_SNAP"
                  "${K[@]}" delete volumesnapshot $OLD_SNAP -n $NAMESPACE --ignore-not-found=true
                done
                
                echo "✅ Retention cleanup complete"
              else
                echo "ℹ️  No cleanup needed (only $TOTAL snapshots)"
              fi
              
              echo ""
              echo "=== Snapshot Job Complete ==="
              echo "Created: $SNAPSHOT_NAME"
              echo "Retained: $RETENTION_COUNT snapshots"
              echo "Deleted: ${DELETE_COUNT:-0} old snapshots"

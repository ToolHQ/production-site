---
# Snapshot Automation RBAC
# Grants permissions for CronJob to create and manage VolumeSnapshots
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: snapshot-creator
  namespace: postgres
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: snapshot-manager
  namespace: postgres
rules:
- apiGroups: ["snapshot.storage.k8s.io"]
  resources: ["volumesnapshots"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: snapshot-creator-binding
  namespace: postgres
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: snapshot-manager
subjects:
- kind: ServiceAccount
  name: snapshot-creator
  namespace: postgres

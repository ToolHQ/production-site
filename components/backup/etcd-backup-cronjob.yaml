apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-backup
  namespace: kube-system
spec:
  suspend: false
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 21600
      template:
        spec:
          restartPolicy: OnFailure
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          nodeSelector:
            node-role.kubernetes.io/control-plane: ""
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
          initContainers:
            - name: etcd-snapshot
              # Use Alpine for fast/reliable package install
              image: alpine:3
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsUser: 0 # Need root to write to hostPath /var/backup and read PKI
              env:
                - name: ETCDCTL_API
                  value: "3"
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Installing etcdctl..."
                  apk add --no-cache etcd-ctl || apk add --no-cache etcd

                  BACKUP_DIR="/host-backup/etcd"
                  mkdir -p $BACKUP_DIR

                  SNAPSHOT_NAME="etcd-$(date +%Y%m%d-%H%M%S).db"
                  SNAPSHOT_PATH="$BACKUP_DIR/$SNAPSHOT_NAME"

                  echo "Creating snapshot: $SNAPSHOT_PATH"

                  etcdctl snapshot save "$SNAPSHOT_PATH" \
                    --endpoints=https://127.0.0.1:2379 \
                    --cacert=/etc/kubernetes/pki/etcd/ca.crt \
                    --cert=/etc/kubernetes/pki/etcd/server.crt \
                    --key=/etc/kubernetes/pki/etcd/server.key

                  # Save filename for the upload container
                  echo "$SNAPSHOT_NAME" > "$BACKUP_DIR/latest_snapshot"

                  # Keep only the four newest local snapshots (~24h); longer retention lives in MinIO/GDrive.
                  set -- "$BACKUP_DIR"/etcd-*.db
                  if [ -e "$1" ]; then
                      ls -1t "$BACKUP_DIR"/etcd-*.db | awk 'NR > 4' | while IFS= read -r old_snapshot; do
                          rm -f "$old_snapshot"
                      done
                  fi

                  echo "Snapshot Success."
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                  ephemeral-storage: 50Mi
                limits:
                  cpu: 150m
                  memory: 128Mi
                  ephemeral-storage: 1Gi
              volumeMounts:
                - name: etcd-certs
                  mountPath: /etc/kubernetes/pki/etcd
                  readOnly: true
                - name: backup
                  mountPath: /host-backup
          containers:
            - name: s3-upload
              image: minio/mc
              imagePullPolicy: IfNotPresent
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: AWS_ACCESS_KEY_ID
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: AWS_SECRET_ACCESS_KEY
                - name: MINIO_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: AWS_ENDPOINTS
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  # Configure alias
                  mc alias set myminio $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY

                  BACKUP_DIR="/host-backup/etcd"

                  if [ -f "$BACKUP_DIR/latest_snapshot" ]; then
                      SNAPSHOT_NAME=$(cat "$BACKUP_DIR/latest_snapshot")
                      echo "Found snapshot: $SNAPSHOT_NAME. Uploading..."
                      
                      mc cp "$BACKUP_DIR/$SNAPSHOT_NAME" "myminio/k8s-backups/etcd/$SNAPSHOT_NAME"

                      echo "Pruning MinIO etcd snapshots down to the four newest objects..."
                      mc ls myminio/k8s-backups/etcd | awk '/etcd-.*\.db$/ {print $NF}' | sort -r | awk 'NR > 4' | while IFS= read -r old_snapshot; do
                        mc rm --force "myminio/k8s-backups/etcd/$old_snapshot"
                      done

                      echo "Cleaning legacy ETCD upload artifacts from the bucket..."
                      mc ls myminio/k8s-backups/etcd | awk '/(etcd-.*\.db\.part|latest_snapshot|test-write\.txt|perm-check-.*\.txt)$/ {print $NF}' | while IFS= read -r legacy_object; do
                        mc rm --force "myminio/k8s-backups/etcd/$legacy_object"
                      done

                      echo "Upload complete."
                  else
                      echo "No snapshot definition found ($BACKUP_DIR/latest_snapshot). Skipping upload."
                      exit 1
                  fi
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                  ephemeral-storage: 50Mi
                limits:
                  cpu: 150m
                  memory: 128Mi
                  ephemeral-storage: 1Gi
              volumeMounts:
                - name: backup
                  mountPath: /host-backup
          volumes:
            - name: etcd-certs
              hostPath:
                path: /etc/kubernetes/pki/etcd
                type: Directory
            - name: backup
              hostPath:
                path: /var/backup
                type: DirectoryOrCreate

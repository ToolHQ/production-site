apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-backup
  namespace: kube-system
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          nodeSelector:
            node-role.kubernetes.io/control-plane: ""
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
          initContainers:
            - name: etcd-snapshot
              # Use Alpine for fast/reliable package install
              image: alpine:3
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsUser: 0 # Need root to write to hostPath /var/backup and read PKI
              env:
                - name: ETCDCTL_API
                  value: "3"
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Installing etcdctl..."
                  apk add --no-cache etcd-ctl || apk add --no-cache etcd
                  
                  BACKUP_DIR="/host-backup/etcd"
                  mkdir -p $BACKUP_DIR
                  
                  SNAPSHOT_NAME="etcd-$(date +%Y%m%d-%H%M%S).db"
                  SNAPSHOT_PATH="$BACKUP_DIR/$SNAPSHOT_NAME"
                  
                  echo "Creating snapshot: $SNAPSHOT_PATH"
                  
                  etcdctl snapshot save "$SNAPSHOT_PATH" \
                    --endpoints=https://127.0.0.1:2379 \
                    --cacert=/etc/kubernetes/pki/etcd/ca.crt \
                    --cert=/etc/kubernetes/pki/etcd/server.crt \
                    --key=/etc/kubernetes/pki/etcd/server.key
                  
                  # Save filename for the upload container
                  echo "$SNAPSHOT_NAME" > "$BACKUP_DIR/latest_snapshot"
                  
                  # Cleanup old backups (Keep 3 days)
                  find "$BACKUP_DIR" -name "etcd-*.db" -mtime +3 -delete
                  
                  echo "Snapshot Success."
              volumeMounts:
                - name: etcd-certs
                  mountPath: /etc/kubernetes/pki/etcd
                  readOnly: true
                - name: backup
                  mountPath: /host-backup
          containers:
            - name: s3-upload
              image: minio/mc
              imagePullPolicy: IfNotPresent
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: AWS_ACCESS_KEY_ID
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: AWS_SECRET_ACCESS_KEY
                - name: MINIO_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: AWS_ENDPOINTS
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  # Configure alias
                  mc alias set myminio $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY
                  
                  BACKUP_DIR="/host-backup/etcd"
                  
                  if [ -f "$BACKUP_DIR/latest_snapshot" ]; then
                      SNAPSHOT_NAME=$(cat "$BACKUP_DIR/latest_snapshot")
                      echo "Found snapshot: $SNAPSHOT_NAME. Uploading..."
                      
                      mc cp "$BACKUP_DIR/$SNAPSHOT_NAME" "myminio/k8s-backups/etcd/$SNAPSHOT_NAME"
                      echo "Upload complete."
                  else
                      echo "No snapshot definition found ($BACKUP_DIR/latest_snapshot). Skipping upload."
                      exit 1
                  fi
              volumeMounts:
                - name: backup
                  mountPath: /host-backup
          volumes:
            - name: etcd-certs
              hostPath:
                path: /etc/kubernetes/pki/etcd
                type: Directory
            - name: backup
              hostPath:
                path: /data/minio/k8s-backups
                type: DirectoryOrCreate

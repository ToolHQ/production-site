apiVersion: v1
kind: ServiceAccount
metadata:
  name: minio-watchdog
  namespace: minio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: minio-watchdog
  namespace: minio
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: minio-watchdog
  namespace: minio
subjects:
  - kind: ServiceAccount
    name: minio-watchdog
    namespace: minio
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: minio-watchdog
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: minio-capacity-watchdog
  namespace: minio
spec:
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: minio-watchdog
          restartPolicy: Never
          containers:
            - name: watchdog
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -ceu
                - |
                  POD=$(kubectl get pod -n minio -l app=minio --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
                  if [ -z "$POD" ]; then
                    echo "[$(date -Iseconds)] CRITICAL no running app=minio pod found"
                    exit 1
                  fi

                  USAGE=$(kubectl exec -n minio "$POD" -- sh -c "df -P /data | tail -1 | tr -s ' ' | cut -d ' ' -f5 | tr -d '%'" )
                  TS=$(date -Iseconds)
                  if [ "$USAGE" -ge 85 ]; then
                    echo "[$TS] CRITICAL MinIO usage=${USAGE}%"
                  elif [ "$USAGE" -ge 75 ]; then
                    echo "[$TS] WARNING MinIO usage=${USAGE}%"
                  else
                    echo "[$TS] OK MinIO usage=${USAGE}%"
                  fi


apiVersion: v1
kind: LimitRange
metadata:
  name: longhorn-limits
  namespace: longhorn-system
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 1Gi
    defaultRequest:
        cpu: 10m
        memory: 128Mi
        ephemeral-storage: 50Mi
    type: Container

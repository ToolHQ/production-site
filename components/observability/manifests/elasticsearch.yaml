apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: oci-logs
  namespace: elastic-system
spec:
  version: 8.11.0
  nodeSets:
  - name: default
    count: 2
    config:
      node.store.allow_mmap: false
    podTemplate:
      spec:
        containers:
        - name: elasticsearch
          resources:
            requests:
              memory: 512Mi
              cpu: 0.1
            limits:
              memory: 1Gi
              cpu: 1
          env:
          - name: ES_JAVA_OPTS
            value: "-Xms512m -Xmx512m"
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: longhorn # Explicitly use longhorn for replication
---
apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: oci-logs
  namespace: elastic-system
spec:
  version: 8.11.0
  count: 1
  elasticsearchRef:
    name: oci-logs
  podTemplate:
    spec:
      containers:
      - name: kibana
        resources:
          requests:
            memory: 256Mi
            cpu: 0.1
          limits:
            memory: 1Gi
            cpu: 0.5

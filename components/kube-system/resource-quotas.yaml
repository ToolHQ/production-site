---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: system-quota
  namespace: kube-system
spec:
  hard:
    requests.cpu: "2000m"
    requests.memory: "4Gi"
    limits.cpu: "6500m"
    limits.memory: "10Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: longhorn-quota
  namespace: longhorn-system
spec:
  hard:
    requests.cpu: "3000m" # T-200 2026-05-02: raised from 1000m (was 95% used); headroom for instance-manager churn
    requests.memory: "8Gi" # bumped from 5Gi: v1.11.1 higher container memory requests
    limits.cpu: "20" # hotfix T-199 2026-05-02: v1.11.1 adds longhorn-csi-plugin DaemonSet (3×1500m=4500m) + increased UI limits
    limits.memory: "24Gi" # bumped from 16Gi: v1.11.1 csi-plugin + manager memory overhead
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: nexus-quota
  namespace: nexus
spec:
  hard:
    requests.cpu: "150m" # was 200m; used 100m → +30%=130m → ceiling 150m (T-103-Ph3)
    requests.memory: "2Gi"
    limits.cpu: "1000m"
    limits.memory: "4Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: postgres-quota
  namespace: postgres
spec:
  hard:
    requests.cpu: "300m" # was 500m; used 200m (2 pods × 100m, 2026-04-04)
    requests.memory: "1Gi"
    limits.cpu: "1500m"
    limits.memory: "3Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: minio-quota
  namespace: minio
spec:
  hard:
    requests.cpu: "50m" # was 100m; used 10m → +30%=13m → ceiling 50m (T-103-Ph3)
    requests.memory: "1Gi"
    limits.cpu: "1000m"
    limits.memory: "2Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: coroot-quota
  namespace: coroot
spec:
  hard:
    requests.cpu: "300m" # was 500m; used 190m (2026-04-04 post-T-103-Ph2)
    requests.memory: "3Gi"
    limits.cpu: "5000m"
    limits.memory: "8Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: kubecost-quota
  namespace: kubecost
spec:
  hard:
    requests.cpu: "250m" # kubecost baseline is 90m; internal Prometheus needs +100m, so 250m preserves ~30% headroom
    requests.memory: "1536Mi" # kubecost baseline is 784Mi; internal Prometheus needs +384Mi, so 1536Mi preserves ~30% headroom
    limits.cpu: "1500m"
    limits.memory: "3Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ingress-nginx-quota
  namespace: ingress-nginx
spec:
  hard:
    requests.cpu: "50m" # was 100m; used 25m → +30%=32.5m → ceiling 50m (T-103-Ph3)
    requests.memory: "512Mi"
    limits.cpu: "800m"
    limits.memory: "1Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cert-manager-quota
  namespace: cert-manager
spec:
  hard:
    requests.cpu: "100m" # was 200m; used 30m (3 pods, 2026-04-04)
    requests.memory: "512Mi"
    limits.cpu: "600m"
    limits.memory: "1280Mi" # steady-state pods already consume 1Gi; chain-repair needs +64Mi without reopening the namespace too far
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dashboard-quota
  namespace: kubernetes-dashboard
spec:
  hard:
    requests.cpu: "150m" # was 200m; used 50m (2026-04-04)
    requests.memory: "512Mi"
    limits.cpu: "1500m"
    limits.memory: "3Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: default-quota
  namespace: default
spec:
  hard:
    requests.cpu: "200m"
    requests.memory: "512Mi"
    limits.cpu: "600m"
    limits.memory: "1Gi"

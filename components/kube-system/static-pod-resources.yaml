# static-pod-resources.yaml
# Source of truth for Control Plane (Static Pod) tuning.
# Ingested by setup_k8s_cluster.sh to maintain modularity.

kube-controller-manager:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 128Mi

kube-scheduler:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 150m
    memory: 64Mi

etcd:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 300m
    memory: 1024Mi

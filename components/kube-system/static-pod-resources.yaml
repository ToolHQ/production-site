# static-pod-resources.yaml
# Source of truth for Control Plane (Static Pod) tuning.
# Ingested by setup_k8s_cluster.sh to maintain modularity.

kube-controller-manager:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m    # raised from 300m — 2026-05-01 incident: liveness probe TLS timeout under GC pressure
    memory: 256Mi  # raised from 128Mi — insufficient for informer caches with 50+ namespaces + Longhorn

kube-scheduler:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 150m
    memory: 64Mi

etcd:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 300m
    memory: 1024Mi

# CronJob: failed-pod-cleaner (T-197)
# Limpa pods em estado Failed/Evicted em todos os namespaces a cada 6h.
# Previne acumulação de pods evicted durante eventos de DiskPressure (ex: snapshot-controller).
#
# Aplicar: kubectl apply -f components/kube-system/failed-pod-cleaner.yaml
# Remover: kubectl delete -f components/kube-system/failed-pod-cleaner.yaml
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: failed-pod-cleaner
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: failed-pod-cleaner
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: failed-pod-cleaner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: failed-pod-cleaner
subjects:
  - kind: ServiceAccount
    name: failed-pod-cleaner
    namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: failed-pod-cleaner
  namespace: kube-system
  labels:
    app: failed-pod-cleaner
    owner: copilot-vsode
spec:
  # Roda a cada 6h — suficiente para impedir acumulação sem overhead
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          serviceAccountName: failed-pod-cleaner
          restartPolicy: OnFailure
          containers:
            - name: cleaner
              # registry.k8s.io/kubectl é imagem oficial multi-arch ARM64 (distroless, sem shell)
              # Usar comando direto — sem /bin/sh
              image: registry.k8s.io/kubectl:v1.28.0
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
              # Distroless: não há shell — usar kubectl diretamente como entrypoint
              command:
                - kubectl
                - delete
                - pods
                - --all-namespaces
                - --field-selector=status.phase=Failed
                - --ignore-not-found

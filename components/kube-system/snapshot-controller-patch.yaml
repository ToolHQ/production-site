spec:
  template:
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - snapshot-controller
                topologyKey: kubernetes.io/hostname
      containers:
        - name: snapshot-controller
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 128Mi

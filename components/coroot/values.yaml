# Optimized Coroot Configuration for Low-Resource ARM Cluster

corootCE:
  replicas: 1
  image:
    tag: "1.18.6"
  nodeSelector:
    kubernetes.io/hostname: k8s-node-1  # pin to node where coroot-data PVC is attached (pvc-efbe8d2c) — T-195/T-200
  env:
    - name: BOOTSTRAP_CLICKHOUSE_ADDRESS
      value: "clickhouse:9000"
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      cpu: 300m
      memory: 900Mi  # raised from 600Mi — OOMKilled 2026-05-02 after clickhouse restart
      ephemeral-storage: 1Gi
  # Persistence and Ingress from original
  persistentVolume:
    size: 2Gi
    storageClassName: longhorn-2
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: coroot.dnor.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - coroot.dnor.io
        secretName: coroot-tls
    annotations:
      cert-manager.io/cluster-issuer: dnor-ca-issuer

corootClusterAgent:
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
    limits:
      cpu: 150m
      memory: 600Mi

node-agent:
  priorityClassName: system-node-critical
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
    limits:
      cpu: 150m
      memory: 600Mi

clickhouse:
  enabled: true
  nodeSelector:
    kubernetes.io/hostname: k8s-node-3  # pin to node where clickhouse PVC is attached (pvc-23ab203e) — T-195/T-200
  command:
    - "/bin/bash"
    - "-c"
    - |
      # 1. Garantir que o diretorio persistente existe no PVC
      mkdir -p /bitnami/clickhouse/data
      
      # 2. Se /var/lib/clickhouse for um diretorio real e nao um link, migrar dados e recriar como link
      if [ -d /var/lib/clickhouse ] && [ ! -L /var/lib/clickhouse ]; then
        echo "📦 Migrando dados efemeros para o volume persistente..."
        cp -a /var/lib/clickhouse/* /bitnami/clickhouse/data/ 2>/dev/null || true
        rm -rf /var/lib/clickhouse
      fi
      
      # 3. Criar o link simbolico para persistir os dados no PVC
      ln -sfn /bitnami/clickhouse/data /var/lib/clickhouse
      echo "✅ Link simbolico de dados criado: /var/lib/clickhouse -> /bitnami/clickhouse/data"
      
      # 4. Linkar as configuracoes de overrides do Bitnami para a pasta oficial do Clickhouse
      mkdir -p /etc/clickhouse-server/config.d
      if [ -d /bitnami/clickhouse/etc/conf.d ]; then
        ln -sfn /bitnami/clickhouse/etc/conf.d/* /etc/clickhouse-server/config.d/
        echo "✅ Configs de overrides linkadas para /etc/clickhouse-server/config.d/"
      fi
      
      # 5. Chamar o entrypoint original da imagem Clickhouse
      echo "🚀 Iniciando Clickhouse Server..."
      exec /entrypoint.sh
  image:
    registry: "docker.io"
    repository: "clickhouse/clickhouse-server"
    tag: "24.3"
  resourcesPreset: "none"
  resources:
    requests:
      cpu: 50m
      memory: 1024Mi
    limits:
      cpu: 500m
      memory: 2048Mi
      ephemeral-storage: 8Gi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: longhorn-2

prometheus:
  enabled: true
  nodeExporter:
    enabled: true
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    resources:
      requests:
        cpu: 10m
        memory: 30Mi
      limits:
        cpu: 100m
        memory: 100Mi
  server:
    extraFlags:
      - web.enable-remote-write-receiver
      - storage.tsdb.retention.size=1500MB
    resources:
      requests:
        cpu: 60m
        memory: 300Mi  # actual steady-state ~267Mi; was 400Mi (over-provisioned request)
      limits:
        cpu: 300m
        memory: 800Mi  # raised from 600Mi — 6 restarts (Exit 2); TSDB WAL replay spikes at startup
    persistentVolume:
      enabled: true
      size: 4Gi
      storageClass: longhorn-2

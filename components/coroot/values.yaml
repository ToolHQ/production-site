# Optimized Coroot Configuration for Low-Resource ARM Cluster

corootCE:
  replicas: 1
  image:
    tag: "1.17.6"
  env:
    - name: BOOTSTRAP_CLICKHOUSE_ADDRESS
      value: "clickhouse:9000"
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      cpu: 300m
      memory: 900Mi  # raised from 600Mi — OOMKilled 2026-05-02 after clickhouse restart
      ephemeral-storage: 1Gi
  # Persistence and Ingress from original
  persistentVolume:
    size: 2Gi
    storageClassName: longhorn-2
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: coroot.dnor.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - coroot.dnor.io
        secretName: coroot-tls
    annotations:
      cert-manager.io/cluster-issuer: dnor-ca-issuer

corootClusterAgent:
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
    limits:
      cpu: 150m
      memory: 600Mi

node-agent:
  priorityClassName: system-node-critical
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
    limits:
      cpu: 150m
      memory: 600Mi

clickhouse:
  enabled: true
  command: []
  image:
    registry: "docker.io"
    repository: "clickhouse/clickhouse-server"
    tag: "24.3"
  resourcesPreset: "none"
  resources:
    requests:
      cpu: 50m
      memory: 1024Mi
    limits:
      cpu: 500m
      memory: 2048Mi
      ephemeral-storage: 8Gi
  persistence:
    enabled: true
    size: 5Gi
    storageClass: longhorn-2

prometheus:
  enabled: true
  server:
    extraFlags:
      - web.enable-remote-write-receiver
      - storage.tsdb.retention.size=1500MB
    resources:
      requests:
        cpu: 60m
        memory: 300Mi  # actual steady-state ~267Mi; was 400Mi (over-provisioned request)
      limits:
        cpu: 300m
        memory: 800Mi  # raised from 600Mi — 6 restarts (Exit 2); TSDB WAL replay spikes at startup
    persistentVolume:
      enabled: true
      size: 4Gi
      storageClass: longhorn-2

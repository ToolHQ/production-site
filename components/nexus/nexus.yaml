apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-deployment
  namespace: nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      containers:
        - name: nexus
          image: "sonatype/nexus3:3.85.0-java17-alpine"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              protocol: TCP
            - containerPort: 18444
              protocol: TCP
            - containerPort: 18445
              protocol: TCP
          env:
            - name: INSTALL4J_ADD_VM_PARAMS
              value: "-Xms512m -Xmx512m -XX:MaxMetaspaceSize=256m -Xss256k -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.net.preferIPv4Stack=true"
          resources:
            limits:
              memory: 1280Mi
            requests:
              memory: 768Mi
          volumeMounts:
            - mountPath: /nexus-data
              name: nexusdata
      initContainers:
        - name: volume-mount-hack-nexus
          image: busybox
          command: ["sh", "-c", "chown -R 200:200 /nexus-data"]
          volumeMounts:
            - name: nexusdata
              mountPath: /nexus-data
      volumes:
        - name: nexusdata
          persistentVolumeClaim:
            claimName: nexus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-service
  namespace: nexus
spec:
  selector:
    app: nexus
  type: NodePort
  ports:
    - name: tcp-port
      port: 8081
      targetPort: 8081
      nodePort: 31081 # Explicit NodePort for the Nexus UI
      protocol: TCP
    - name: docker-tcp-port
      port: 18444
      targetPort: 18444
      nodePort: 31444 # Explicit NodePort for Docker HTTP
      protocol: TCP
    - name: docker-tcp-port-https
      port: 18445
      targetPort: 18445
      nodePort: 31445 # Explicit NodePort for Docker HTTPS
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
  namespace: nexus
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 800m
spec:
  ingressClassName: nginx
  rules:
    - host: nexus.dnor.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-service
                port:
                  number: 8081
    - host: docker-nexus.dnor.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-service
                port:
                  number: 18444

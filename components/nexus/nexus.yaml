apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-deployment
  namespace: nexus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      containers:
        - name: nexus
          image: "sonatype/nexus3:3.91.1-alpine"
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              protocol: TCP
            - containerPort: 18444
              protocol: TCP
            - containerPort: 18445
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 40
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          env:
            - name: INSTALL4J_ADD_VM_PARAMS
              value: "-Xms512m -Xmx1024m -XX:MaxMetaspaceSize=256m -Xss256k -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.net.preferIPv4Stack=true"
            - name: NEXUS_SECURITY_RANDOMPASSWORD
              value: "false"
            - name: NEXUS_EULA_AGREED
              value: "3.91.1"
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 2Gi
              ephemeral-storage: 4Gi
          volumeMounts:
            - mountPath: /nexus-data
              name: nexusdata
      initContainers:
        - name: volume-mount-hack-nexus
          image: busybox
          command: ["sh", "-c", "chown -R 200:200 /nexus-data"]
          volumeMounts:
            - name: nexusdata
              mountPath: /nexus-data
      volumes:
        - name: nexusdata
          persistentVolumeClaim:
            claimName: nexus-pvc
      nodeSelector:
        kubernetes.io/hostname: k8s-node-1
      tolerations:
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-service
  namespace: nexus
spec:
  selector:
    app: nexus
  type: NodePort
  ports:
    - name: tcp-port
      port: 8081
      targetPort: 8081
      nodePort: 31081 # Explicit NodePort for the Nexus UI
      protocol: TCP
    - name: docker-tcp-port
      port: 18444
      targetPort: 8081
      nodePort: 31444 # Explicit NodePort for Docker HTTP
      protocol: TCP
    - name: docker-tcp-port-https
      port: 18445
      targetPort: 8081
      nodePort: 31445 # Explicit NodePort for Docker HTTPS
      protocol: TCP
    - name: docker-http
      port: 18082
      targetPort: 8082
      nodePort: 32082
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
  namespace: nexus
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 800m
    cert-manager.io/cluster-issuer: letsencrypt-dns01
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nexus.dnor.io
        - docker-nexus.dnor.io
      secretName: nexus-ingress-tls
  rules:
    - host: nexus.dnor.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-service
                port:
                  number: 8081
    - host: docker-nexus.dnor.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-service
                port:
                  number: 18444

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-deployment
  namespace: nexus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      containers:
        - name: nexus
          image: "sonatype/nexus3:3.91.1-alpine"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              protocol: TCP
            - containerPort: 18444
              protocol: TCP
            - containerPort: 18445
              protocol: TCP
          startupProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          env:
            - name: INSTALL4J_ADD_VM_PARAMS
              value: "-Xms768m -Xmx1280m -XX:MaxDirectMemorySize=256m -XX:MaxMetaspaceSize=192m -Xss256k -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.net.preferIPv4Stack=true"
          resources:
            requests:
              cpu: 50m # was 80m, reduced to fit k8s-node-3 requests
              memory: 768Mi
            limits:
              cpu: 600m
              memory: 2Gi
              ephemeral-storage: 8Gi
          volumeMounts:
            - mountPath: /nexus-data
              name: nexusdata
      initContainers:
        - name: volume-mount-hack-nexus
          image: busybox
          command: ["sh", "-c", "chown -R 200:200 /nexus-data"]
          volumeMounts:
            - name: nexusdata
              mountPath: /nexus-data
      volumes:
        - name: nexusdata
          persistentVolumeClaim:
            claimName: nexus-pvc
      nodeSelector:
        kubernetes.io/hostname: k8s-node-2
      tolerations:
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-service
  namespace: nexus
spec:
  selector:
    app: nexus
  type: NodePort
  ports:
    - name: tcp-port
      port: 8081
      targetPort: 8081
      nodePort: 31081 # Explicit NodePort for the Nexus UI
      protocol: TCP
    - name: docker-tcp-port
      port: 18444
      targetPort: 18444
      nodePort: 31444 # Explicit NodePort for Docker HTTP
      protocol: TCP
    - name: docker-tcp-port-https
      port: 18445
      targetPort: 18445
      nodePort: 31445 # Explicit NodePort for Docker HTTPS
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
  namespace: nexus
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 800m
    cert-manager.io/cluster-issuer: letsencrypt-dns01
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nexus.dnor.io
        - docker-nexus.dnor.io
      secretName: nexus-ingress-tls
  rules:
    - host: nexus.dnor.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-service
                port:
                  number: 8081
    - host: docker-nexus.dnor.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-service
                port:
                  number: 18444

# CodeQL analysis — self-hosted runners (zero GitHub Actions cost)
# Replaces the broken "default setup" that looped every 5 minutes.
# Runs: weekly schedule + on PRs touching security-sensitive code.

name: CodeQL Security Scan

on:
  # Weekly scan (Sunday 03:00 UTC)
  schedule:
    - cron: '0 3 * * 0'
  # PRs touching sensitive paths
  pull_request:
    branches: [main]
    paths:
      - "apps/agent-meter/crates/**/*.rs"
      - "apps/qdbback/**/*.js"
      - "apps/back-end/**"
      - "tools/citools/**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze-js:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: [self-hosted, Linux, X64, ssdnodes]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  analyze-rust:
    name: CodeQL (Rust — experimental)
    runs-on: [self-hosted, Linux, ARM64, hetzner-ci]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust

      - name: Build agent-meter
        working-directory: apps/agent-meter
        run: cargo build --workspace

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"

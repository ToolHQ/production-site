name: Release agent-meter-proxy

on:
  push:
    tags:
      - 'agent-meter-proxy-v*'
  workflow_dispatch:
    inputs:
      only-msi:
        description: 'Build only Windows MSI wizards (skip Linux/macOS builds)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

# Cost optimization: Linux builds on self-hosted ($0), only macOS/Windows on GitHub-hosted.

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: [self-hosted, Linux, X64, ssdnodes]
            artifact: agent-meter-proxy-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: [self-hosted, Linux, ARM64, hetzner-ci]
            artifact: agent-meter-proxy-linux-aarch64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          source "$HOME/.cargo/env"
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build
        working-directory: apps/agent-meter
        run: |
          source "$HOME/.cargo/env"
          cargo build --release --target ${{ matrix.target }} -p agent-meter-proxy

      - name: Rename artifact
        run: cp apps/agent-meter/target/${{ matrix.target }}/release/agent-meter-proxy ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-platform:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agent-meter-proxy-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agent-meter-proxy-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: agent-meter-proxy-windows-x86_64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: agent-meter-proxy-windows-aarch64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: apps/agent-meter
        run: cargo build --release --target ${{ matrix.target }} -p agent-meter-proxy

      - name: Rename artifact
        shell: bash
        run: |
          src="apps/agent-meter/target/${{ matrix.target }}/release/agent-meter-proxy"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [build-linux, build-platform, package, package-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent-meter-proxy-linux-x86_64
            agent-meter-proxy-linux-aarch64
            agent-meter-proxy-darwin-x86_64
            agent-meter-proxy-darwin-aarch64
            agent-meter-proxy-windows-x86_64.exe
            agent-meter-proxy-windows-aarch64.exe
            agent-meter-proxy_*.deb
            agent-meter-proxy_*.rpm
            agent-meter-proxy_*.tgz
            agent-meter-proxy-*.dmg
            agent-meter-proxy-*.msi
            agent-meter-proxy-*-windows-*.zip
          generate_release_notes: true

  # ============================================================
  # Package: Create installers (MSI, DEB, RPM, DMG, TGZ)
  # ============================================================
  package:
    needs: [build-linux, build-platform]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Set executable permissions
        run: |
          chmod +x agent-meter-proxy-linux-x86_64
          chmod +x agent-meter-proxy-linux-aarch64
          chmod +x agent-meter-proxy-darwin-x86_64
          chmod +x agent-meter-proxy-darwin-aarch64

      # === Linux: TGZ (portable) ===
      - name: Package TGZ (Linux)
        run: |
          # Create portable tar.gz for Linux
          for arch in x86_64 aarch64; do
            binary="agent-meter-proxy-linux-${arch}"
            if [ -f "$binary" ]; then
              tar -czvf "agent-meter-proxy-${arch}.tgz" -C . "$binary"
            fi
          done

      # === Linux: DEB (using fpm) ===
      - name: Install fpm
        run: sudo gem install fpm

      - name: Package DEB (Linux)
        run: |
          fpm -s tar -t deb \
            -n agent-meter-proxy \
            -v 1.2.4 \
            -a amd64 \
            --prefix /usr/bin \
            agent-meter-proxy-linux-x86_64=agent-meter-proxy

      # === Linux: RPM (using fpm) ===
      - name: Package RPM (Linux)
        run: |
          fpm -s tar -t rpm \
            -n agent-meter-proxy \
            -v 1.2.4 \
            -a x86_64 \
            --prefix /usr/bin \
            agent-meter-proxy-linux-x86_64=agent-meter-proxy

      # === Upload Linux packages ===
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            agent-meter-proxy-*.tgz
            agent-meter-proxy_*.deb
            agent-meter-proxy_*.rpm
          retention-days: 5

  # ============================================================
  # Package (Windows): full wizard MSI via WiX UI + Util, with
  # optional Authenticode signing when secrets are present.
  # ============================================================
  package-windows:
    needs: [build-platform]
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/agent-meter/scripts/release/wix
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: apps/agent-meter/scripts/release/wix

      - name: Generate WiX branding assets
        shell: pwsh
        working-directory: apps/agent-meter/scripts/release/wix
        run: |
          pip install pillow
          python gen_assets.py

      - name: Install WiX toolset + extensions
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.0
          wix extension add -g WixToolset.UI.wixext/5.0.0
          wix extension add -g WixToolset.Util.wixext/5.0.0

      - name: Build MSI x64 (wizard + EULA)
        shell: pwsh
        run: |
          wix build ProductUI.wxs `
            -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext `
            -arch x64 `
            -d "ProxyExe=agent-meter-proxy-windows-x86_64.exe" `
            -o agent-meter-proxy-1.2.4-x64.msi

      - name: Build MSI ARM64 (wizard + EULA)
        shell: pwsh
        run: |
          wix build ProductUI.wxs `
            -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext `
            -arch arm64 `
            -d "ProxyExe=agent-meter-proxy-windows-aarch64.exe" `
            -o agent-meter-proxy-1.2.4-arm64.msi

      - name: Package portable ZIP (x64 + ARM64)
        shell: pwsh
        run: |
          pwsh ../package-windows-portable.ps1 `
            -ExeArtifact agent-meter-proxy-windows-x86_64.exe -ArchLabel x64 -Version 1.2.4
          pwsh ../package-windows-portable.ps1 `
            -ExeArtifact agent-meter-proxy-windows-aarch64.exe -ArchLabel arm64 -Version 1.2.4

      - name: Sign MSI (optional — upload unsigned if secrets missing)
        shell: pwsh
        env:
          WIN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WIN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:WIN_CERT_BASE64) -or [string]::IsNullOrEmpty($env:WIN_CERT_PASSWORD)) {
            Write-Host "No signing certificate — publishing unsigned MSI (acceptable for internal/dev installs)."
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WIN_CERT_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found on runner" }
          foreach ($msi in Get-ChildItem -Filter "agent-meter-proxy-1.2.4-*.msi") {
            & $signtool.FullName sign /f $pfx /p $env:WIN_CERT_PASSWORD `
              /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $msi.FullName
            & $signtool.FullName verify /pa /v $msi.FullName
          }
          Remove-Item $pfx -Force

      - name: Upload Windows MSI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: |
            apps/agent-meter/scripts/release/wix/agent-meter-proxy-1.2.4-*.msi
            apps/agent-meter/scripts/release/wix/agent-meter-proxy-1.2.4-windows-*.zip
          retention-days: 5

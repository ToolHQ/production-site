name: Release agent-meter-proxy

on:
  push:
    tags:
      - 'agent-meter-proxy-v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

# Cost optimization: Linux builds on self-hosted ($0), only macOS/Windows on GitHub-hosted.

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: [self-hosted, Linux, X64, ssdnodes]
            artifact: agent-meter-proxy-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: [self-hosted, Linux, ARM64, hetzner-ci]
            artifact: agent-meter-proxy-linux-aarch64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          source "$HOME/.cargo/env"
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build
        working-directory: apps/agent-meter
        run: |
          source "$HOME/.cargo/env"
          cargo build --release --target ${{ matrix.target }} -p agent-meter-proxy

      - name: Rename artifact
        run: cp apps/agent-meter/target/${{ matrix.target }}/release/agent-meter-proxy ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-platform:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agent-meter-proxy-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agent-meter-proxy-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: agent-meter-proxy-windows-x86_64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: agent-meter-proxy-windows-aarch64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: apps/agent-meter
        run: cargo build --release --target ${{ matrix.target }} -p agent-meter-proxy

      - name: Rename artifact
        shell: bash
        run: |
          src="apps/agent-meter/target/${{ matrix.target }}/release/agent-meter-proxy"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [build-linux, build-platform, package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent-meter-proxy-linux-x86_64
            agent-meter-proxy-linux-aarch64
            agent-meter-proxy-darwin-x86_64
            agent-meter-proxy-darwin-aarch64
            agent-meter-proxy-windows-x86_64.exe
            agent-meter-proxy-windows-aarch64.exe
            agent-meter-proxy_*.deb
            agent-meter-proxy_*.rpm
            agent-meter-proxy_*.tgz
            agent-meter-proxy-*.dmg
            agent-meter-proxy-*.msi
          generate_release_notes: true

  # ============================================================
  # Package: Create installers (MSI, DEB, RPM, DMG, TGZ)
  # ============================================================
  package:
    needs: [build-linux, build-platform]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Set executable permissions
        run: |
          chmod +x agent-meter-proxy-linux-x86_64
          chmod +x agent-meter-proxy-linux-aarch64
          chmod +x agent-meter-proxy-darwin-x86_64
          chmod +x agent-meter-proxy-darwin-aarch64

      # === Linux: TGZ (portable) ===
      - name: Package TGZ (Linux)
        run: |
          # Create portable tar.gz for Linux
          for arch in x86_64 aarch64; do
            binary="agent-meter-proxy-linux-${arch}"
            if [ -f "$binary" ]; then
              tar -czvf "agent-meter-proxy-${arch}.tgz" -C . "$binary"
            fi
          done

      # === Linux: DEB (using fpm) ===
      - name: Install fpm
        run: sudo gem install fpm

      - name: Package DEB (Linux)
        run: |
          # Create DEB for x86_64
          fpm -s tar -t deb \
            -n agent-meter-proxy \
            -v 1.2.3 \
            -a amd64 \
            --prefix /usr/bin \
            --before-install scripts/release/package-linux.sh \
            agent-meter-proxy-linux-x86_64=agent-meter-proxy

      # === Linux: RPM (using fpm) ===
      - name: Package RPM (Linux)
        run: |
          # Create RPM for x86_64
          fpm -s tar -t rpm \
            -n agent-meter-proxy \
            -v 1.2.3 \
            -a x86_64 \
            --prefix /usr/bin \
            --before-install scripts/release/package-linux.sh \
            agent-meter-proxy-linux-x86_64=agent-meter-proxy

      # === Windows: MSI (using WiX) ===
      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 5.0.0 || dotnet tool update --global wix --version 5.0.0

      - name: Build MSI (Windows x64)
        run: |
          # Copy Windows binary to staging
          cp agent-meter-proxy-windows-x86_64.exe scripts/release/wix/
          
          # Build MSI using WiX
          cd scripts/release/wix
          wix build Product.wxs -o agent-meter-proxy-1.2.3-x64.msi -d "SourceDir=."
          cd ../..
          
          mv scripts/release/wix/agent-meter-proxy-1.2.3-x64.msi .

      - name: Build MSI (Windows ARM64)
        run: |
          # Copy Windows ARM64 binary to staging
          cp agent-meter-proxy-windows-aarch64.exe scripts/release/wix/
          
          # Update WiX source file for ARM64
          sed -i 's/agent-meter-proxy-windows-x86_64.exe/agent-meter-proxy-windows-aarch64.exe/' scripts/release/wix/Product.wxs
          
          # Build MSI using WiX
          cd scripts/release/wix
          wix build Product.wxs -o agent-meter-proxy-1.2.3-arm64.msi -d "SourceDir=."
          cd ../..
          
          mv scripts/release/wix/agent-meter-proxy-1.2.3-arm64.msi .

      # === Upload all packages ===
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            agent-meter-proxy-*.tgz
            agent-meter-proxy_*.deb
            agent-meter-proxy_*.rpm
            agent-meter-proxy-*.msi
          retention-days: 5

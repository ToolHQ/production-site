name: Release agent-meter-proxy

on:
  push:
    tags:
      - 'agent-meter-proxy-v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

# Cost optimization: Linux builds on self-hosted ($0), only macOS/Windows on GitHub-hosted.

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: [self-hosted, Linux, X64, ssdnodes]
            artifact: agent-meter-proxy-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: [self-hosted, Linux, ARM64, hetzner-ci]
            artifact: agent-meter-proxy-linux-aarch64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          source "$HOME/.cargo/env"
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build
        working-directory: apps/agent-meter
        run: |
          source "$HOME/.cargo/env"
          cargo build --release --target ${{ matrix.target }} -p agent-meter-proxy

      - name: Rename artifact
        run: cp apps/agent-meter/target/${{ matrix.target }}/release/agent-meter-proxy ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-platform:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agent-meter-proxy-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agent-meter-proxy-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: agent-meter-proxy-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: apps/agent-meter
        run: cargo build --release --target ${{ matrix.target }} -p agent-meter-proxy

      - name: Rename artifact
        shell: bash
        run: |
          src="apps/agent-meter/target/${{ matrix.target }}/release/agent-meter-proxy"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [build-linux, build-platform]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent-meter-proxy-linux-x86_64
            agent-meter-proxy-linux-aarch64
            agent-meter-proxy-darwin-x86_64
            agent-meter-proxy-darwin-aarch64
            agent-meter-proxy-windows-x86_64.exe
          generate_release_notes: true

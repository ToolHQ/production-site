name: Release agent-meter-proxy

on:
  push:
    tags:
      - "agent-meter-proxy-v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-meter-proxy-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-meter-proxy-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agent-meter-proxy-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agent-meter-proxy-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: agent-meter-proxy-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        working-directory: apps/agent-meter
        run: cargo build --release --target ${{ matrix.target }} -p agent-meter-proxy
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename artifact
        shell: bash
        run: |
          src="apps/agent-meter/target/${{ matrix.target }}/release/agent-meter-proxy"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent-meter-proxy-linux-x86_64
            agent-meter-proxy-linux-aarch64
            agent-meter-proxy-darwin-x86_64
            agent-meter-proxy-darwin-aarch64
            agent-meter-proxy-windows-x86_64.exe
          generate_release_notes: true

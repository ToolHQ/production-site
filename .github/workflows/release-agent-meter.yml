# agent-meter release workflow
# Triggered by pushing a tag like `agent-meter-v0.1.0`
# Cross-compiles for linux-x86_64, linux-arm64, darwin-arm64
# Publishes binaries to GitHub Releases + Docker image to GHCR

name: Release agent-meter

on:
  push:
    tags:
      - "agent-meter-v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-meter-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-meter-linux-arm64
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: agent-meter-darwin-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/agent-meter/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('apps/agent-meter/Cargo.lock') }}

      - name: Build release binary
        working-directory: apps/agent-meter
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ matrix.target }} -p agent-meter-collector

      - name: Package binary
        run: |
          mkdir -p dist
          cp apps/agent-meter/target/${{ matrix.target }}/release/agent-meter-collector dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/agent-meter-v}" >> $GITHUB_OUTPUT

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-meter-linux-arm64
          path: dist/

      - name: Download linux-x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-meter-linux-x86_64
          path: dist/

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/agent-meter
          file: apps/agent-meter/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/toolhq/agent-meter:${{ steps.version.outputs.version }}
            ghcr.io/toolhq/agent-meter:latest

  release:
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/agent-meter-v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "agent-meter v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz

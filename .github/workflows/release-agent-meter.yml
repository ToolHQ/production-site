# agent-meter release workflow
# Triggered by pushing a tag like `agent-meter-v0.1.0`
# Cross-compiles for linux-x86_64, linux-arm64, darwin-arm64
# Publishes binaries to GitHub Releases + Docker image to GHCR
#
# Cost optimization: Linux builds on self-hosted runners ($0),
# only macOS uses GitHub-hosted runners.

name: Release agent-meter

on:
  push:
    tags:
      - "agent-meter-v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: [self-hosted, Linux, X64, ssdnodes]
            artifact: agent-meter-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: [self-hosted, Linux, ARM64, hetzner-ci]
            artifact: agent-meter-linux-arm64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          source "$HOME/.cargo/env"
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build release binary
        working-directory: apps/agent-meter
        run: |
          source "$HOME/.cargo/env"
          cargo build --release --target ${{ matrix.target }} -p agent-meter-collector

      - name: Package binary
        run: |
          mkdir -p dist
          cp apps/agent-meter/target/${{ matrix.target }}/release/agent-meter-collector dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/agent-meter/target
          key: darwin-arm64-cargo-${{ hashFiles('apps/agent-meter/Cargo.lock') }}

      - name: Build release binary
        working-directory: apps/agent-meter
        run: cargo build --release --target aarch64-apple-darwin -p agent-meter-collector

      - name: Package binary
        run: |
          mkdir -p dist
          cp apps/agent-meter/target/aarch64-apple-darwin/release/agent-meter-collector dist/agent-meter-darwin-arm64
          chmod +x dist/agent-meter-darwin-arm64
          tar -czf dist/agent-meter-darwin-arm64.tar.gz -C dist agent-meter-darwin-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-meter-darwin-arm64
          path: dist/agent-meter-darwin-arm64.tar.gz

  docker:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/agent-meter-v}" >> $GITHUB_OUTPUT

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-meter-linux-arm64
          path: dist/

      - name: Download linux-x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-meter-linux-x86_64
          path: dist/

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/agent-meter
          file: apps/agent-meter/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/toolhq/agent-meter:${{ steps.version.outputs.version }}
            ghcr.io/toolhq/agent-meter:latest

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, docker]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/agent-meter-v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "agent-meter v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz

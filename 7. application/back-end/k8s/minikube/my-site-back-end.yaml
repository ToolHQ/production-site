apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-site-back-end-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-site-back-end
  template:
    metadata:
      labels:
        app: my-site-back-end
    spec:
      imagePullSecrets:
        - name: regsecret
      containers:
        - name: my-site-back-end
          image: docker-nexus.localhost/repository/docker-repo/my-site-back-end:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: 40Mi
              cpu: 0.2
            limits:
              memory: 256Mi
              cpu: 0.5
          env:
            - name: NODE_ENV
              value: production
            - name: DB_DNORIO_POSTGRES_SCHEMA
              value: public
            - name: DB_DNORIO_POSTGRES_USER
              value: postgres
            - name: DB_DNORIO_POSTGRES_PASS
              value: passwordinitial
            - name: DB_DNORIO_POSTGRES_HOST
              value: postgres-service.postgres
            - name: DB_DNORIO_POSTGRES_PORT
              value: '5432'
            - name: DB_DNORIO_POSTGRES_DATABASE
              value: postgres
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
            successThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: my-site-back-end-service
spec:
  selector:
    app: my-site-back-end
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: my-site-back-end-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-site-back-end-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

map $http_upgrade $connection_update {
  default upgrade;
  '' close;
}

server {
    absolute_redirect off;
    listen 8080 default_server;
    resolver 127.0.0.11 valid=5s ipv6=off;
    proxy_max_temp_file_size 0;
    gzip on;
    gzip_disable "msie6";
    underscores_in_headers off;
    root /data/www;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  # proxy_set_header Host $host;
    proxy_set_header Host "minio.localhost";
    proxy_set_header X-Req-Id $request_id;
    proxy_pass_request_headers on;

    location = / {
      set $upstream http://minikube/my-site/static/index.html;
      proxy_pass $upstream;
    }

    location ~ ^/(.*)$ {
      proxy_pass http://minikube:80/my-site/static/$1$is_args$args;
	    proxy_intercept_errors on;
      error_page 404 =404 /404.html;
    }
}

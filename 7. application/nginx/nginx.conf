load_module modules/ngx_http_geoip2_module.so;
load_module modules/ngx_stream_geoip2_module.so;
load_module modules/ngx_http_headers_more_filter_module.so; # OpenResty Headers More

user nginx;
worker_processes 1;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  more_clear_headers 'Server';

  log_format main escape=json '{'
    '"app@timestamp": "$time_iso8601_p1.$millisec",'
    '"action": "Request received",'
    '"message": "$request $status $request_time $geoip2_city_country_name - $geoip2_region_code - $geoip2_city ($geoip2_latitude, $geoip2_longitude) $http_user_agent",'
    '"http": {'
      '"host": "$host",'
      '"remote_addr": "$remote_addr",'
      '"x_forwarded_for": "$http_x_forwarded_for",'
      '"request": {'
        '"request": "$request",'
        '"method": "$request_method",'
        '"uri": "$request_uri",'
        '"scheme": "$scheme",'
        '"referer": "$http_referer",'
        '"user_agent": "$http_user_agent",'
        '"upstream_response_time": "$upstream_response_time",'
        '"upstream_connect_time": "$upstream_connect_time"'
      '},'
      '"response": {'
        '"status": $httpStatus,'
        '"body_bytes_sent": $httpBodyBytesSent,'
        '"content_type": "$sent_http_content_type"'
      '},'
      '"elapsed_time": $elapsedTime,'
      '"proxy": {'
        '"host": "$proxy_host",'
        '"uri": "$uri"'
      '},'
      '"location": {'
        '"lat": $locationLat,'
        '"lon": $locationLon'
      '},'
      '"address": {'
        '"country": {'
          '"code": "$geoip2_city_country_code",'
          '"name": "$geoip2_city_country_name"'
        '},'
        '"city": {'
          '"id": "$geoip2_city_geoname_id",'
          '"name": "$geoip2_city"'
        '},'
        '"region": {'
          '"code": "$geoip2_region_code",'
          '"name": "$geoip2_region_name"'
        '}'
      '}'
    '},'
    '"req-id": "$request_id"'
  '}';

  access_log /var/log/nginx/access.log  main;
  proxy_busy_buffers_size               512k;
  proxy_buffers                         4 512k;
  proxy_buffer_size                     256k;

  sendfile                              on;
  # tcp_nopush                            on;

  keepalive_timeout                     65;
  gzip                                  on;

  # GeoIP2
  geoip2 /usr/share/geoip/GeoLite2-Country.mmdb {
    $geoip2_country_code source=$http_x_forwarded_for country iso_code;
    $geoip2_country_name source=$http_x_forwarded_for country names en;
    $geoip2_country_geoname_id source=$http_x_forwarded_for country geoname_id;
    $geoip2_continent_code source=$http_x_forwarded_for continent code;
    $geoip2_continent_name source=$http_x_forwarded_for continent names en;
    $geoip2_continent_geoname_id source=$http_x_forwarded_for continent geoname_id;
  }
  geoip2 /usr/share/geoip/GeoLite2-City.mmdb {
    $geoip2_city_country_code source=$http_x_forwarded_for country iso_code;
    $geoip2_city_country_name source=$http_x_forwarded_for country names en;
    $geoip2_city_country_geoname_id source=$http_x_forwarded_for country geoname_id;
    $geoip2_city source=$http_x_forwarded_for city names en;
    $geoip2_city_geoname_id source=$http_x_forwarded_for city geoname_id;
    $geoip2_postal_code source=$http_x_forwarded_for postal code;
    $geoip2_dma_code source=$http_x_forwarded_for location metro_code;
    $geoip2_latitude source=$http_x_forwarded_for location latitude;
    $geoip2_longitude source=$http_x_forwarded_for location longitude;
    $geoip2_time_zone source=$http_x_forwarded_for location time_zone;
    $geoip2_region_code source=$http_x_forwarded_for subdivisions 0 iso_code;
    $geoip2_region_name source=$http_x_forwarded_for subdivisions 0 names en;
    $geoip2_region_geoname_id source=$http_x_forwarded_for subdivisions 0 geoname_id;
    $geoip2_subregion_code source=$http_x_forwarded_for subdivisions 1 iso_code;
    $geoip2_subregion_name source=$http_x_forwarded_for subdivisions 1 names en;
    $geoip2_subregion_geoname_id source=$http_x_forwarded_for subdivisions 1 geoname_id;
    $geoip2_city_continent_code source=$http_x_forwarded_for continent code;
    $geoip2_city_continent_name source=$http_x_forwarded_for continent names en;
  }
  geoip2 /usr/share/geoip/GeoLite2-ASN.mmdb {
    $geoip2_asn source=$http_x_forwarded_for autonomous_system_number;
    $geoip2_org source=$http_x_forwarded_for autonomous_system_organization;
  }
  map "$time_local:$msec" $time_local_ms { ~(^\S+)(\s+\S+):\d+\.(\d+)$ $1.$3$2; }
  map $time_iso8601 $time_iso8601_p1 {
    ~([^+]+) $1;
  }
  map $msec $millisec {
    ~\.([0-9]+)$ $1;
  }
  map $geoip2_latitude $locationLat {
    default "$geoip2_latitude";
    ""      "null";
  }
  map $geoip2_longitude $locationLon {
    default "$geoip2_longitude";
    ""      "null";
  }
  map $status $httpStatus {
    default "$status";
    ""      "null";
  }
  map $request_time $elapsedTime {
    default "$request_time";
    ""      "null";
  }
  map $body_bytes_sent $httpBodyBytesSent {
    default "$body_bytes_sent";
    ""      "null";
  }

  server {
    listen      80;
    server_name "";
    return      444;
  }

  include /etc/nginx/conf.d/*.conf;

  server {
    listen 80;
    server_name healthchecking;
    access_log off;
    location = /health {
      return 200;
    }
    location = /health/liveness {
      return 200;
    }
    location = /health/readiness {
      return 200;
    }
    location = /startup {
      return 200;
    }
  }
}
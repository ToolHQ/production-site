<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norio Sound</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Norio Sound</h1>
        <!-- Home Page -->
        <div id="homePage">
          <form id="loginForm">
              <div class="form-group">
                  <label for="loginEmail">Email:</label>
                  <input type="email" id="loginEmail" name="loginEmail" required>
              </div>
              <div class="form-group">
                  <label for="loginPassword">Password:</label>
                  <input type="password" id="loginPassword" name="loginPassword" required>
              </div>
              <div class="form-group">
                  <button type="submit">Login</button>
              </div>
          </form>
          <p>Don't have an account? <a href="#" id="signupLink">Sign up here</a></p>
          <p>Forgot your password? <a href="#" class="forgot-password-link">Forgot password</a></p>
        </div>

        <!-- Signup Page -->
        <div id="signupPage" style="display: none;">
          <form id="signupForm">
              <div class="form-group">
                  <label for="username">Username:</label>
                  <input type="text" id="username" name="username" required>
              </div>
              <div class="form-group">
                  <label for="email">Email:</label>
                  <input type="email" id="email" name="email" required>
              </div>
              <div class="form-group">
                  <label for="password">Password:</label>
                  <input type="password" id="password" name="password" required>
              </div>
              <div class="form-group">
                  <label for="confirmPassword">Confirm Password:</label>
                  <input type="password" id="confirmPassword" name="confirmPassword" required>
              </div>
              <div class="form-group">
                  <label for="birthday">Birthday:</label>
                  <input type="date" id="birthday" name="birthday" required>
              </div>
              <div class="form-group">
                  <button type="submit">Sign Up</button>
              </div>
          </form>
          <p>Already have an account? <a href="#" id="loginLink">Login here</a></p>
          <p>Forgot your password? <a href="#" class="forgot-password-link">Forgot password</a></p>
        </div>

        <!-- Change Password Page -->
        <div id="changePasswordPage" style="display: none;">
            <h2>Change Password</h2>
            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="currentPassword">Current Password:</label>
                    <input type="password" id="currentPassword" name="currentPassword" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">New Password:</label>
                    <input type="password" id="newPassword" name="newPassword" required>
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword">Confirm New Password:</label>
                    <input type="password" id="confirmNewPassword" name="confirmNewPassword" required>
                </div>
                <div class="form-group">
                    <button type="submit">Change Password</button>
                </div>
            </form>
            <button id="backToHome">Go back to Home page</button>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <p id="modalMessage"></p>
        </div>
    </div>

    <script src="bundle.js"></script>
</body>
</html>

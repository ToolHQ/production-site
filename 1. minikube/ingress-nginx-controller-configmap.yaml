---
kind: ConfigMap
apiVersion: v1
metadata:
  name: ingress-nginx-controller
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: ingress-nginx
    app.kubernetes.io/name: ingress-nginx
data:
  hsts: 'false'
  # use-gzip: 'true'
  use-geoip: 'false'
  use-geoip2: 'true'
  log-format-escape-json: 'true'
  log-format-upstream: '{"app@timestamp":"$time_iso8601_p1.$millisec","action":"Request received","message":"$request $status $request_time $geoip2_city_country_name - $geoip2_region_code - $geoip2_city ($geoip2_latitude, $geoip2_longitude) $http_user_agent","http":{"host":"$host","remote_addr":"$remote_addr","x_forwarded_for":"$http_x_forwarded_for","request":{"request":"$request","method":"$request_method","uri":"$request_uri","scheme":"$scheme","referer":"$http_referer","user_agent":"$http_user_agent","upstream_response_time":"$upstream_response_time","upstream_connect_time":"$upstream_connect_time"},"response":{"status":$httpStatus,"upstream_status":"$httpUpstreamStatus","body_bytes_sent":$httpBodyBytesSent,"content_type":"$sent_http_content_type"},"elapsed_time":$elapsedTime,"proxy":{"host":"$proxy_host","header_host":"$http_host","uri":"$uri"},"location":{"lat":$locationLat,"lon":$locationLon},"address":{"country":{"code":"$geoip2_city_country_code","name":"$geoip2_city_country_name"},"city":{"id":"$geoip2_city_geoname_id","name":"$geoip2_city"},"region":{"code":"$geoip2_region_code","name":"$geoip2_region_name"}}},"req-id":"$request_id"}'
  use-forwarded-headers: "true"
  forwarded-for-header: "X-Forwarded-For"
  http-snippet: |
    map "$time_local:$msec" $time_local_ms { ~(^\S+)(\s+\S+):\d+\.(\d+)$ $1.$3$2; }
    map $time_iso8601 $time_iso8601_p1 {
      ~([^+]+) $1;
    }
    map $msec $millisec {
      ~\.([0-9]+)$ $1;
    }
    map $geoip2_latitude $locationLat {
      default "$geoip2_latitude";
      ""      "null";
    }
    map $geoip2_longitude $locationLon {
      default "$geoip2_longitude";
      ""      "null";
    }
    map $status $httpStatus {
      default "$status";
      ""      "null";
    }
    map $upstream_status $httpUpstreamStatus {
      default "$upstream_status";
      ""      "null";
    }
    map $request_time $elapsedTime {
      default "$request_time";
      ""      "null";
    }
    map $body_bytes_sent $httpBodyBytesSent {
      default "$body_bytes_sent";
      ""      "null";
    }
apiVersion: beat.k8s.elastic.co/v1beta1
kind: Beat
metadata:
  name: quickstart
spec:
  type: filebeat
  version: 8.17.1
  config:
    setup.ilm.enabled: false
    setup.template.enabled: false
    setup.template.overwrite: false
    setup.kibana.enabled: false
    setup.ilm.check_exists: false
    setup.dashboards.enabled: false
    setup.template.settings:
      index.default_pipeline: ""
      index.final_pipeline: ""
    filebeat:
      modules: []
      logging.level: debug
      logging.selectors: ["*", "reader_json", "input"]
      autodiscover:
        providers:
          - type: kubernetes
            node: ${NODE_NAME}
            cleanup_timeout: 60s
            hints.enabled: false
            templates:
              # Node.js Applications (Back-End)
              - condition:
                  contains:
                    kubernetes.labels.app: "my-site-back-end"
                config:
                  - type: container
                    id: "my-site-back-end-logs-${data.kubernetes.pod.name:-unknown-pod}-${data.kubernetes.container.id:-unknown-container}"
                    paths:
                      - /var/log/containers/*${data.kubernetes.container.id}.log
                    multiline:
                      pattern: "^[[:space:]]|^[[:alpha:]]+Error|^}$|^Node\\.js|^\\[|^$"
                      negate: false
                      match: after
                      when:
                        not.regexp:
                          message: '^\{'
              # # Kibana Logs (Multiline for Kibana Errors)
              # - condition:
              #     equals:
              #       kubernetes.container.name: "kibana"
              #   config:
              #     - type: container
              #       paths:
              #         - /var/log/containers/*${data.kubernetes.container.id}.log
              #       multiline.pattern: "^[\\d{4}-\\d{2}-\\d{2}T.*?] [(INFO|WARN|ERROR|FATAL)]"
              #       multiline.negate: true
              #       multiline.match: after
              # # CoreDNS Logs (Single-line, No Multiline Processing)
              # - condition:
              #     equals:
              #       kubernetes.container.name: "coredns"
              #   config:
              #     - type: container
              #       paths:
              #         - /var/log/containers/*${data.kubernetes.container.id}.log
              #       # No multiline rules applied for CoreDNS
    processors:
      - add_host_metadata: {}
      - drop_event:
          when:
            not:
              equals:
                kubernetes.container.name: "my-site-back-end"
      - decode_json_fields:
          fields: ["message"]
          process_array: false
          max_depth: 1
          target: "json"
          overwrite_keys: true
          expand_keys: false
          add_error_key: true
          when:
            regexp:
              message: '^\{'
    output.logstash:
      hosts: "quickstart-ls-beats"
    output.elasticsearch:
      enabled: false
    # output.console:
    #   enabled: true
    #   pretty: false
  daemonSet:
    podTemplate:
      spec:
        dnsPolicy: ClusterFirstWithHostNet
        hostNetwork: true
        securityContext:
          runAsUser: 0
        serviceAccount: elastic-beat-filebeat-quickstart
        automountServiceAccountToken: true
        containers:
          - name: filebeat
            env:
              - name: NODE_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
            volumeMounts:
              - name: varlogcontainers
                mountPath: /var/log/containers
              - name: varlogpods
                mountPath: /var/log/pods
              - name: varlibdockercontainers
                mountPath: /var/lib/docker/containers
        volumes:
          - name: varlogcontainers
            hostPath:
              path: /var/log/containers
          - name: varlogpods
            hostPath:
              path: /var/log/pods
          - name: varlibdockercontainers
            hostPath:
              path: /var/lib/docker/containers
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elastic-beat-filebeat-quickstart
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elastic-beat-autodiscover-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: elastic-beat-autodiscover
subjects:
  - kind: ServiceAccount
    name: elastic-beat-filebeat-quickstart
    namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: elastic-beat-autodiscover
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - namespaces
      - events
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["apps"]
    resources:
      - replicasets
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch

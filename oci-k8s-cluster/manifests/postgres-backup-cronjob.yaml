apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-auto-snapshot
  namespace: postgres
  labels:
    app: postgres
    component: backup
    type: automated-snapshot
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: postgres
            component: backup-job
        spec:
          serviceAccountName: snapshot-creator
          restartPolicy: OnFailure
          containers:
          - name: snapshot-creator
            image: docker.io/bitnami/kubectl:latest
            imagePullPolicy: IfNotPresent
            env:
            - name: PVC_NAME
              value: postgres-pvc
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RETENTION_COUNT
              value: "7"
            command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "=== Automated Snapshot Creator ==="
              echo "PVC: $PVC_NAME"
              echo "Namespace: $NAMESPACE"
              echo "Retention: $RETENTION_COUNT snapshots"
              echo ""

              # 1. Create snapshot with timestamp
              SNAPSHOT_NAME="auto-$(date +%Y%m%d-%H%M%S)"
              TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S UTC')

              echo "📸 Creating snapshot: $SNAPSHOT_NAME"

              cat <<EOF | kubectl apply -f -
              apiVersion: snapshot.storage.k8s.io/v1
              kind: VolumeSnapshot
              metadata:
                name: $SNAPSHOT_NAME
                namespace: $NAMESPACE
                annotations:
                  snapshot.longhorn.io/display-name: "Auto Snapshot"
                  snapshot.longhorn.io/description: "Automated snapshot created at $TIMESTAMP"
                labels:
                  snapshot-type: "automated"
                  created-by: "cronjob"
                  pvc-source: "$PVC_NAME"
              spec:
                volumeSnapshotClassName: longhorn-snapshot-vsc
                source:
                  persistentVolumeClaimName: $PVC_NAME
              EOF

              echo "⏳ Waiting for snapshot to be ready..."
              kubectl wait --for=jsonpath='{.status.readyToUse}'=true \
                volumesnapshot/$SNAPSHOT_NAME -n $NAMESPACE --timeout=10m

              echo "✅ Snapshot $SNAPSHOT_NAME is ready"

              # 2. Apply retention policy (cleanup old snapshots)
              echo ""
              echo "🧹 Applying retention policy (keep last $RETENTION_COUNT)..."

              # Get all automated snapshots sorted by creation time (oldest first)
              SNAPSHOTS=$(kubectl get volumesnapshot -n $NAMESPACE \
                -l snapshot-type=automated,pvc-source=$PVC_NAME \
                --sort-by=.metadata.creationTimestamp \
                -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}')

              # Convert to array
              SNAPSHOT_ARRAY=($SNAPSHOTS)
              TOTAL=${#SNAPSHOT_ARRAY[@]}

              echo "Total automated snapshots: $TOTAL"

              if [ $TOTAL -gt $RETENTION_COUNT ]; then
                DELETE_COUNT=$((TOTAL - RETENTION_COUNT))
                echo "💥 Deleting $DELETE_COUNT old snapshot(s)..."
                
                for ((i=0; i<$DELETE_COUNT; i++)); do
                  OLD_SNAP="${SNAPSHOT_ARRAY[$i]}"
                  echo "  - Deleting: $OLD_SNAP"
                  kubectl delete volumesnapshot $OLD_SNAP -n $NAMESPACE --ignore-not-found=true
                done
                
                echo "✅ Retention cleanup complete"
              else
                echo "ℹ️  No cleanup needed (only $TOTAL snapshots)"
              fi

              echo ""
              echo "=== Snapshot Job Complete ==="
              echo "Created: $SNAPSHOT_NAME"
              echo "Retained: $RETENTION_COUNT snapshots"
              echo "Deleted: ${DELETE_COUNT:-0} old snapshots"

apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-users-config
  namespace: coroot
data:
  users.xml: |
    <clickhouse>
      <users>
        <default>
          <!-- Empty password for passwordless auth -->
          <password></password>
          <networks>
            <ip>::/0</ip>
          </networks>
          <profile>default</profile>
          <quota>default</quota>
        </default>
      </users>
    </clickhouse>

version: '3.8'

services:
  nginx:
    container_name: nginx
    build:
      context: ./7. application/nginx
    environment:
      - STATIC_PROXY_HOST_HEADER=minio.localhost
      - STATIC_SERVICE=http://minikube
      - FORCES_IP=true
      - DNS_RESOLVER=127.0.0.11
    ports:
      - "8080:8080"
    networks:
      - minikube

networks:
  minikube:
    external: true

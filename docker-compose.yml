services:
  nginx:
    container_name: nginx
    build:
      context: ./7. application/nginx
    environment:
      - STATIC_PROXY_HOST_HEADER=minio.localhost
      - STATIC_SERVICE=http://minikube
      - BACK_END_SERVICE=http://back-end:3000
      - FORCES_IP=true
      - DNS_RESOLVER=127.0.0.11
    ports:
      - "8080:8080"
    networks:
      - minikube
    deploy:
      resources:
        limits:
          memory: 16M
          cpus: '0.4'
        reservations:
          memory: 8M
          cpus: '0.1'

  back-end:
    container_name: back-end
    build:
      context: ./7. application/back-end
      args:
        - NPM_OMIT_DEV=optional
      extra_hosts:
        - docker-nexus.localhost:192.168.49.2
        - nexus.localhost:192.168.49.2
        - minio.localhost:192.168.49.2
    command: npm run watch-build-start
    env_file:
      - ./7. application/back-end/.env
    environment:
      - DB_DNORIO_POSTGRES_HOST=minikube
      - DB_DNORIO_POSTGRES_PORT=54322
    volumes:
      - ./7. application/back-end/src:/usr/src/app/src
      - ./7. application/back-end/node_modules:/usr/src/app/node_modules
    ports:
      - 3000:3000
      - 9229:9229
    networks:
      - minikube
    extra_hosts:
      - nexus.localhost:192.168.49.2
      - minio.localhost:192.168.49.2
      - minikube:192.168.49.2
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 50M
          cpus: '0.2'

  pg:
    container_name: pg
    build:
      context: ./5. postgres
    networks:
      - minikube
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - PG_HOST=postgres

networks:
  minikube:
    external: true

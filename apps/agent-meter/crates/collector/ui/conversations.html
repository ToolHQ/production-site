<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Conversations · agent-meter</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/_static/favicon.svg">
<link rel="stylesheet" href="/_static/tokens.css">
<link rel="stylesheet" href="/_static/app.css">
<style>
  /* col layout: title | duration | events | errors | cost | agent | started */
  .conv-cols { grid-template-columns: 1fr 80px 60px 70px 90px 130px 100px; }
  .conv-row { display:grid; gap:0; align-items:center; padding:0 18px; height:52px; border-bottom:1px solid var(--am-border); cursor:pointer; text-decoration:none; color:inherit; transition:background .12s; }
  .conv-row { grid-template-columns: 1fr 80px 60px 70px 90px 130px 100px; }
  .conv-row:hover { background:var(--am-surface-hover); }
  .conv-row:last-child { border-bottom:none; }
  .conv-head { display:grid; grid-template-columns: 1fr 80px 60px 70px 90px 130px 100px; gap:0; padding:0 18px; height:36px; align-items:center; border-bottom:1px solid var(--am-border); background:var(--am-surface-2); }
  .conv-head span { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--am-text-muted); }
  .col-title { min-width:0; overflow:hidden; }
  .conv-title { font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .conv-id { font-family:var(--am-font-mono); font-size:11px; color:var(--am-text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .col-num { font-family:var(--am-font-mono); font-size:13px; text-align:right; white-space:nowrap; }
  .col-err { display:flex; justify-content:center; align-items:center; }
  .col-agent { min-width:0; overflow:hidden; }
  .col-date { font-size:12px; color:var(--am-text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chip { display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; background:var(--am-surface-2); color:var(--am-text-muted); max-width:100%; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .chip.ok { background:color-mix(in srgb,var(--am-success) 12%,transparent); color:var(--am-success); }
  .chip.err { background:color-mix(in srgb,var(--am-danger) 12%,transparent); color:var(--am-danger); }
  .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
  .pager { display:flex; gap:8px; align-items:center; justify-content:flex-end; margin-top:16px; font-size:13px; color:var(--am-text-muted); }
  @media (max-width:960px) {
    /* hide: duration(2), errors(4), agent(6) — keep: title(1), events(3), cost(5), date(7) */
    .conv-row, .conv-head { grid-template-columns: 1fr 60px 90px 100px; }
    .conv-row > *:nth-child(2), .conv-row > *:nth-child(4), .conv-row > *:nth-child(6),
    .conv-head > *:nth-child(2), .conv-head > *:nth-child(4), .conv-head > *:nth-child(6) { display:none; }
  }
</style>
</head>
<body>
<svg style="display:none"><use href="/_static/icons.svg"/></svg>

<div class="am-app">
  <aside class="am-sidebar" id="amSidebar"></aside>
  <header class="am-topbar" id="amTopbar"></header>
  <main class="am-main">
    <div class="am-page-header" style="display:flex;align-items:flex-end;gap:24px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <h1 class="am-page-title">Conversations</h1>
        <p class="am-page-subtitle">All recorded agent conversations. Click a row to open the waterfall trace.</p>
      </div>
      <div class="toolbar">
        <input class="am-input" id="filterInput" placeholder="Filter title / id / agent…" style="max-width:240px">
        <button class="am-btn am-btn-ghost am-btn-sm" id="btnRefresh">
          <svg class="am-icon-sm"><use href="/_static/icons.svg#i-activity"/></svg>Refresh
        </button>
      </div>
    </div>

    <div class="am-card" style="padding:0;overflow:hidden">
      <div class="conv-head">
        <span>Conversation</span>
        <span style="text-align:right">Duration</span>
        <span style="text-align:right">Events</span>
        <span style="text-align:center">Errors</span>
        <span style="text-align:right">Cost</span>
        <span>Agent</span>
        <span>Started</span>
      </div>
      <div id="convList"><div class="am-empty" style="padding:40px;text-align:center">Loading…</div></div>
    </div>

    <div class="pager">
      <button class="am-btn am-btn-ghost am-btn-sm" id="btnPrev" disabled>← Prev</button>
      <span id="pagerInfo">page 1</span>
      <button class="am-btn am-btn-ghost am-btn-sm" id="btnNext">Next →</button>
    </div>
  </main>
  <footer class="am-footer" id="amFooter"></footer>
</div>

<script src="/_static/app.js"></script>
<script>
amShell({active:'conversations', breadcrumb:'Conversations'});

const PAGE_SIZE = 50;
let offset = 0, allRows = [], filterText = '';

function fmtDur(ms) {
  if (!ms || ms < 0) return '—';
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms/1000).toFixed(1) + 's';
  if (ms < 3600000) return (ms/60000).toFixed(1) + 'm';
  return (ms/3600000).toFixed(1) + 'h';
}
function fmtUsd(v) {
  if (!v) return '$0.00';
  if (v < 0.001) return '<$0.001';
  if (v < 0.01) return '$' + v.toFixed(4);
  if (v < 1) return '$' + v.toFixed(3);
  return '$' + v.toFixed(2);
}
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  const now = new Date();
  const diff = now - d;
  if (diff < 60e3) return Math.floor(diff/1e3) + 's ago';
  if (diff < 3600e3) return Math.floor(diff/60e3) + 'm ago';
  if (diff < 86400e3) return Math.floor(diff/3600e3) + 'h ago';
  return d.toLocaleDateString();
}

async function load() {
  try {
    const r = await fetch(`/api/conversations?limit=${PAGE_SIZE}&offset=${offset}`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    allRows = await r.json();
    render();
  } catch(e) {
    document.getElementById('convList').innerHTML = `<div class="am-empty am-muted" style="padding:40px;text-align:center">Error: ${e.message}</div>`;
  }
}

function render() {
  const f = filterText.toLowerCase();
  const rows = f
    ? allRows.filter(c => (c.conversation_id||'').toLowerCase().includes(f) || (c.title||'').toLowerCase().includes(f) || (c.agent||'').toLowerCase().includes(f))
    : allRows;

  document.getElementById('btnPrev').disabled = offset === 0;
  document.getElementById('btnNext').disabled = rows.length < PAGE_SIZE;
  document.getElementById('pagerInfo').textContent = `page ${Math.floor(offset/PAGE_SIZE)+1} · ${rows.length} shown`;

  if (!rows.length) {
    document.getElementById('convList').innerHTML = `<div class="am-empty am-muted" style="padding:40px;text-align:center">No conversations recorded yet.</div>`;
    return;
  }

  document.getElementById('convList').innerHTML = rows.map(c => {
    const id = c.conversation_id;
    const shortId = id.length > 13 ? id.slice(0,8)+'…'+id.slice(-4) : id;
    const title = c.title ? c.title.replace(/</g,'&lt;') : '';
    const hasErr = c.error_count > 0;
    const agent = c.agent || '';
    const agentChip = agent ? `<span class="chip" title="${agent.replace(/"/g,'&quot;')}">${agent.replace(/</g,'&lt;')}</span>` : '<span style="color:var(--am-text-muted);font-size:12px">—</span>';
    return `<a class="conv-row" href="/conversations/${encodeURIComponent(id)}/timeline" title="${title || id}">
      <div class="col-title">
        <div class="conv-title">${title || shortId}</div>
        <div class="conv-id">${shortId}</div>
      </div>
      <div class="col-num">${fmtDur(c.total_duration_ms)}</div>
      <div class="col-num">${c.event_count}</div>
      <div class="col-err"><span class="chip ${hasErr?'err':'ok'}">${c.error_count}</span></div>
      <div class="col-num">${fmtUsd(c.total_usd_cost)}</div>
      <div class="col-agent">${agentChip}</div>
      <div class="col-date">${fmtDate(c.started_at)}</div>
    </a>`;
  }).join('');
}

document.getElementById('filterInput').addEventListener('input', e => {
  filterText = e.target.value; render();
});
document.getElementById('btnRefresh').addEventListener('click', load);
document.getElementById('btnPrev').addEventListener('click', () => { offset = Math.max(0, offset - PAGE_SIZE); load(); });
document.getElementById('btnNext').addEventListener('click', () => { offset += PAGE_SIZE; load(); });

load();
</script>
</body>
</html>

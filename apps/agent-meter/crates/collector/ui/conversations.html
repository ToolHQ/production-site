<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Conversations · agent-meter</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Browse and search AI agent conversations with session replay, tool call timelines, and cost breakdowns.">
<meta property="og:title" content="Conversations · agent-meter">
<meta property="og:description" content="Browse AI agent conversations with session replay, tool call timelines, and cost breakdowns.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://agent-meter.dnor.io/conversations">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/svg+xml" href="/_static/favicon.svg">
<link rel="stylesheet" href="/_static/tokens.css">
<link rel="stylesheet" href="/_static/app.css">
<style>
  /* ── Summary strip ─────── */
  .conv-summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:16px; }
  .stat-card { background:var(--am-surface); border:1px solid var(--am-border); border-radius:var(--am-radius); padding:12px 14px; }
  .stat-card .stat-val { font-size:20px; font-weight:700; font-family:var(--am-font-mono); line-height:1.1; }
  .stat-card .stat-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--am-text-muted); margin-top:2px; }
  .stat-card.accent .stat-val { color:var(--am-accent); }
  .stat-card.success .stat-val { color:var(--am-success); }
  .stat-card.danger .stat-val { color:var(--am-danger); }

  /* ── Row layout — dense 2-line rows ─────── */
  .conv-list { display:flex; flex-direction:column; }
  .conv-row {
    display:grid;
    grid-template-columns: 34px 1fr auto;
    align-items:center;
    gap:10px;
    padding:8px 16px;
    border-bottom:1px solid var(--am-border);
    cursor:pointer; text-decoration:none; color:inherit;
    transition: background .12s var(--am-ease);
    min-height:52px;
  }
  .conv-row:hover { background:var(--am-surface-2); }
  .conv-row:last-child { border-bottom:none; }

  /* ── IDE badge ─────── */
  .ide-badge {
    width:32px; height:32px; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:800; letter-spacing:-.3px; flex-shrink:0;
  }
  .ide-vscode { background:#1a3a6b; color:#4da6ff; }
  .ide-eclipse { background:#3d2200; color:#f7941d; }
  .ide-cursor { background:#0a2e1f; color:#19c37d; }
  .ide-opencode { background:#082838; color:#38bdf8; }
  .ide-claude { background:#3d1032; color:#ec4899; }
  .ide-codex { background:#2d1a5e; color:#a78bfa; }
  .ide-unknown { background:var(--am-surface-2); color:var(--am-text-dim); }

  /* ── Main content (2 lines) ─────── */
  .conv-main { min-width:0; overflow:hidden; }
  .conv-line1 { display:flex; align-items:center; gap:8px; }
  .conv-title {
    font-size:13px; font-weight:500; color:var(--am-text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    flex:1; min-width:0;
  }
  .conv-prompt {
    font-size:11.5px; color:var(--am-text-muted); margin-top:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:100%; line-height:1.3;
    font-style:italic; opacity:.85;
  }
  .conv-response {
    font-size:11px; color:var(--am-success); margin-top:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:100%; line-height:1.3;
    opacity:.75;
  }
  .conv-response::before { content:'↩ '; opacity:.6; }
  .conv-line2 {
    display:flex; align-items:center; gap:6px; margin-top:3px;
    font-size:11px; color:var(--am-text-dim);
    white-space:nowrap; overflow:hidden;
  }
  .conv-line2 .dot { width:3px; height:3px; border-radius:50%; background:var(--am-border-strong); flex-shrink:0; }
  .tag { display:inline-flex; align-items:center; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:600; white-space:nowrap; }
  .tag-agent { background:var(--am-accent-soft); color:var(--am-accent); }
  .tag-model { background:var(--am-surface-2); color:var(--am-text-muted); }
  .tag-err { background:var(--am-danger-soft); color:var(--am-danger); }

  /* ── Right metrics (compact) ─────── */
  .conv-right {
    display:flex; align-items:center; gap:16px; flex-shrink:0;
  }
  .metric { display:flex; flex-direction:column; align-items:flex-end; }
  .metric .mv { font-family:var(--am-font-mono); font-size:12px; font-weight:600; color:var(--am-text); line-height:1.2; }
  .metric .ml { font-size:9px; text-transform:uppercase; letter-spacing:.04em; color:var(--am-text-dim); }
  .metric.cost .mv { color:var(--am-success); }
  .metric.tokens .mv { color:var(--am-info); }
  .conv-time { font-size:11px; color:var(--am-text-muted); text-align:right; min-width:60px; }

  /* ── Header ─────── */
  .conv-head {
    display:flex; align-items:center; padding:8px 16px;
    border-bottom:1px solid var(--am-border-strong); background:var(--am-surface-2);
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--am-text-muted);
  }

  /* ── Toolbar ─────── */
  .toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .ide-filter {
    display:flex; gap:3px; background:var(--am-surface); border:1px solid var(--am-border); border-radius:6px; padding:3px;
  }
  .ide-filter button {
    border:none; background:transparent; color:var(--am-text-dim); font-size:11px; font-weight:600;
    padding:4px 9px; border-radius:4px; cursor:pointer; transition:all .12s;
  }
  .ide-filter button:hover { color:var(--am-text); background:var(--am-surface-2); }
  .ide-filter button.active { background:var(--am-accent-soft); color:var(--am-accent); }
  .pager { display:flex; gap:8px; align-items:center; justify-content:flex-end; margin-top:12px; font-size:12px; color:var(--am-text-muted); }

  @media (max-width:768px) {
    .conv-right .metric.tokens, .conv-right .metric.cost { display:none; }
    .conv-summary { grid-template-columns:repeat(3,1fr); }
  }
</style>
</head>
<body>
<svg style="display:none"><use href="/_static/icons.svg"/></svg>

<div class="am-app">
  <aside class="am-sidebar" id="amSidebar"></aside>
  <header class="am-topbar" id="amTopbar"></header>
  <main class="am-main">
    <div class="am-page-header" style="display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <h1 class="am-page-title">Conversations</h1>
        <p class="am-page-subtitle">Agent session traces — click any row to inspect the full waterfall.</p>
      </div>
      <div class="toolbar">
        <div class="ide-filter" id="ideFilter">
          <button class="active" data-ide="">All</button>
          <button data-ide="copilot-vscode">VS Code</button>
          <button data-ide="copilot-eclipse">Eclipse</button>
          <button data-ide="cursor">Cursor</button>
          <button data-ide="opencode">OpenCode</button>
        </div>
        <input class="am-input" id="filterInput" placeholder="🔍 Search conversations, prompts, agents…" style="min-width:240px;height:34px;font-size:13px;border:1.5px solid var(--am-border-strong);background:var(--am-surface);border-radius:8px;padding:0 12px">
        <button class="am-btn am-btn-ghost am-btn-sm" id="btnRefresh" style="height:30px">
          <svg class="am-icon-sm"><use href="/_static/icons.svg#i-activity"/></svg>Refresh
        </button>
      </div>
    </div>

    <div class="conv-summary" id="summaryStrip"></div>

    <div class="am-card" style="padding:0;overflow:hidden">
      <div class="conv-head">
        <span style="flex:1">Conversations</span>
        <span style="margin-right:16px">Duration · Events · Tokens · Cost · Time</span>
      </div>
      <div id="convList" class="conv-list"><div class="am-empty" style="padding:32px;text-align:center">Loading…</div></div>
    </div>

    <div class="pager">
      <button class="am-btn am-btn-ghost am-btn-sm" id="btnPrev" disabled>← Prev</button>
      <span id="pagerInfo"></span>
      <button class="am-btn am-btn-ghost am-btn-sm" id="btnNext">Next →</button>
    </div>
  </main>
  <footer class="am-footer" id="amFooter"></footer>
</div>

<script src="/_static/app.js"></script>
<script>
amShell({active:'conversations', breadcrumb:'Conversations'});

const PAGE_SIZE = 50;
let offset = 0, allRows = [], filterText = '', ideFilter = '';

function fmtDur(ms) {
  if (!ms || ms < 0) return '—';
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms/1000).toFixed(1) + 's';
  if (ms < 3600000) return (ms/60000).toFixed(1) + 'm';
  return (ms/3600000).toFixed(1) + 'h';
}
function fmtUsd(v) {
  if (!v || v === 0) return '$0';
  if (v < 0.001) return '<$0.001';
  if (v < 0.01) return '$' + v.toFixed(4);
  if (v < 1) return '$' + v.toFixed(3);
  return '$' + v.toFixed(2);
}
function fmtTokens(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return String(n);
}
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  const now = new Date();
  const diff = now - d;
  if (diff < 60e3) return 'now';
  if (diff < 3600e3) return Math.floor(diff/60e3) + 'm';
  if (diff < 86400e3) return Math.floor(diff/3600e3) + 'h';
  if (diff < 172800e3) return '1d';
  return Math.floor(diff/86400e3) + 'd';
}

const IDE_META = {
  'copilot-vscode': { abbr:'VS', cls:'ide-vscode', label:'VS Code' },
  'copilot-eclipse': { abbr:'EC', cls:'ide-eclipse', label:'Eclipse' },
  'cursor': { abbr:'CU', cls:'ide-cursor', label:'Cursor' },
  'opencode': { abbr:'OC', cls:'ide-opencode', label:'OpenCode' },
  'claude-code': { abbr:'CL', cls:'ide-claude', label:'Claude' },
  'codex': { abbr:'CX', cls:'ide-codex', label:'Codex' },
};
function getIde(ide) { return IDE_META[ide] || { abbr:'??', cls:'ide-unknown', label: ide || '?' }; }

// Escape HTML entities to prevent XSS when interpolating into innerHTML
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function shortAgent(a) {
  if (!a) return null;
  return a.replace(/^copilotLanguageModel(Wrapper)?$/, 'Copilot')
    .replace(/^copilotLanguageModel/, 'Copilot·')
    .replace(/^github-copilot-/, '')
    .replace(/^panel\/editorAgent$/, 'Editor Agent');
}
function shortModel(m) {
  if (!m) return null;
  return m.replace(/^gpt-4o-mini.*/, 'gpt-4o-mini')
    .replace(/^gpt-4\.1-.*/, 'gpt-4.1')
    .replace(/^gpt-5-mini.*/, 'gpt-5-mini')
    .replace(/^claude-.*-sonnet.*/, 'claude-sonnet')
    .replace(/^claude-.*-opus.*/, 'claude-opus');
}
// Strip Copilot XML attachment wrappers from titles/prompts
function cleanPrompt(text) {
  if (!text) return '';
  let s = text
    // Remove JSON image/attachment objects at the start
    .replace(/^\s*\{"type"\s*:\s*"image"[\s\S]*?\}\s*/g, '')
    .replace(/^\s*\[\s*\{"type"\s*:\s*"image"[\s\S]*?\]\s*/g, '')
    // Remove XML wrappers and context blocks
    .replace(/<attachments>[\s\S]*?<\/attachments>\s*/g, '')
    .replace(/<attachment\b[^>]*>[\s\S]*?(?:<\/attachment>|$)/g, '')
    .replace(/<\/?(?:context|references|instructions|response|environment_info|workspace_info|userMemory|sessionMemory|repoMemory|conversation-summary|securityRequirements|operationalSafety|implementationDiscipline|parallelizationStrategy|taskTracking|toolUseInstructions|communicationStyle|outputFormatting|memoryInstructions|notebookInstructions|fileLinkification|skill-context|current_datetime|antml_thinking|antml_thinking_mode|antml_reasoning_effort)\b[^>]*>[\s\S]*?(?:<\/[^>]+>|$)/g, '')
    .replace(/<\/?(?:context|references|instructions|response)\b[^>]*>/g, '')
    // Strip common VS Code OTLP context prefixes
    .replace(/^The current date is \d{4}-\d{2}-\d{2}[\s\S]*?(?=\n[A-Z]|\n\n)/gm, '')
    .replace(/^Terminals?:\s*Terminal:\s*bash[\s\S]*?(?=\n[A-Z]|\n\n)/gm, '')
    .replace(/^In this environment you have access to[\s\S]*$/g, '')
    .replace(/^You are an expert AI programming[\s\S]*$/g, '')
    .replace(/^Follow the user's requirements[\s\S]*$/g, '')
    .replace(/^The following tasks can be executed[\s\S]*$/g, '');
  // Remove ALL HTML/XML tags iteratively until stable (prevents multi-char bypass)
  let prev;
  do {
    prev = s;
    s = s.replace(/<[^>]*>/g, '');
  } while (s !== prev);
  s = s.replace(/\s+/g, ' ').trim();
  // If after cleanup we got nothing or too short, return empty
  if (s.length < 4) return '';
  return s;
}

async function load() {
  try {
    let url = `/api/conversations?limit=${PAGE_SIZE}&offset=${offset}`;
    if (ideFilter) url += `&ide=${encodeURIComponent(ideFilter)}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    allRows = await r.json();
    renderSummary();
    render();
  } catch(e) {
    document.getElementById('convList').innerHTML = `<div class="am-empty" style="padding:32px;text-align:center;color:var(--am-danger)">Error: ${e.message}</div>`;
  }
}

function renderSummary() {
  const n = allRows.length;
  const evts = allRows.reduce((s,c) => s + (c.event_count||0), 0);
  const cost = allRows.reduce((s,c) => s + (c.total_usd_cost||0), 0);
  const errs = allRows.reduce((s,c) => s + (c.error_count||0), 0);
  const toks = allRows.reduce((s,c) => s + (c.total_tokens_in||0) + (c.total_tokens_out||0), 0);
  document.getElementById('summaryStrip').innerHTML = `
    <div class="stat-card accent"><div class="stat-val">${n}</div><div class="stat-label">Sessions</div></div>
    <div class="stat-card"><div class="stat-val">${fmtTokens(evts)}</div><div class="stat-label">Events</div></div>
    <div class="stat-card"><div class="stat-val">${fmtTokens(toks)}</div><div class="stat-label">Tokens</div></div>
    <div class="stat-card success"><div class="stat-val">${fmtUsd(cost)}</div><div class="stat-label">Cost</div></div>
    <div class="stat-card ${errs>0?'danger':''}"><div class="stat-val">${errs}</div><div class="stat-label">Errors</div></div>`;
}

function render() {
  const f = filterText.toLowerCase();
  let rows = f ? allRows.filter(c =>
    (c.conversation_id||'').toLowerCase().includes(f) ||
    (c.title||'').toLowerCase().includes(f) ||
    (c.initial_prompt||'').toLowerCase().includes(f) ||
    (c.response_preview||'').toLowerCase().includes(f) ||
    (c.agent||'').toLowerCase().includes(f) ||
    (c.model||'').toLowerCase().includes(f)
  ) : allRows;

  document.getElementById('btnPrev').disabled = offset === 0;
  document.getElementById('btnNext').disabled = allRows.length < PAGE_SIZE;
  document.getElementById('pagerInfo').textContent = `pg ${Math.floor(offset/PAGE_SIZE)+1}`;

  if (!rows.length) {
    document.getElementById('convList').innerHTML = `<div class="am-empty" style="padding:32px;text-align:center;color:var(--am-text-dim)">No conversations found.</div>`;
    return;
  }

  document.getElementById('convList').innerHTML = rows.map(c => {
    const id = c.conversation_id;
    const shortId = id.length > 16 ? id.slice(0,8)+'…'+id.slice(-4) : id;
    const rawTitle = c.title || '';
    const rawPrompt = c.initial_prompt || '';
    const rawResponse = c.response_preview || '';
    const title = cleanPrompt(rawTitle).replace(/</g,'&lt;').replace(/"/g,'&quot;');
    const prompt = cleanPrompt(rawPrompt).replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/\n/g,' ');
    const response = cleanPrompt(rawResponse).replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/\n/g,' ');
    const ide = getIde(c.ide);
    const agent = esc(shortAgent(c.agent));
    const model = esc(shortModel(c.model));
    const hasErr = c.error_count > 0;
    const totalTok = (c.total_tokens_in||0) + (c.total_tokens_out||0);

    // Line 2 chips
    let line2 = `<span class="tag tag-model" style="font-family:var(--am-font-mono)">${esc(shortId)}</span>`;
    if (agent) line2 += `<span class="dot"></span><span class="tag tag-agent">${agent}</span>`;
    if (model) line2 += `<span class="dot"></span><span class="tag tag-model">${model}</span>`;
    if (hasErr) line2 += `<span class="dot"></span><span class="tag tag-err">${c.error_count} err</span>`;

    // Display: title OR prompt OR response_preview OR model-based fallback
    const displayTitle = title || prompt || (response ? response.slice(0, 80) : '') || (model ? `${model} session` : '');
    const showPromptBelow = prompt && title && prompt !== title;
    // Response preview: show below title only if title came from elsewhere
    const responseSnippet = (response && displayTitle !== response.slice(0, 80)) ? (response.length > 120 ? response.slice(0,120) + '…' : response) : '';

    return `<a class="conv-row" href="/conversations/${encodeURIComponent(id)}/timeline">
      <div class="ide-badge ${ide.cls}" title="${esc(ide.label)}">${esc(ide.abbr)}</div>
      <div class="conv-main">
        <div class="conv-line1"><span class="conv-title">${displayTitle || '<span style=\"color:var(--am-text-dim)\">Untitled session</span>'}</span></div>
        ${showPromptBelow ? `<div class="conv-prompt">${prompt}</div>` : ''}
        ${responseSnippet ? `<div class="conv-response">${responseSnippet}</div>` : ''}
        <div class="conv-line2">${line2}</div>
      </div>
      <div class="conv-right">
        <div class="metric"><span class="mv">${fmtDur(c.total_duration_ms)}</span><span class="ml">dur</span></div>
        <div class="metric"><span class="mv">${c.event_count}</span><span class="ml">evts</span></div>
        <div class="metric tokens"><span class="mv">${fmtTokens(totalTok)}</span><span class="ml">tok</span></div>
        <div class="metric cost"><span class="mv">${fmtUsd(c.total_usd_cost)}</span><span class="ml">cost</span></div>
        <div class="conv-time">${fmtDate(c.started_at)}</div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('filterInput').addEventListener('input', e => { filterText = e.target.value; render(); });
document.getElementById('btnRefresh').addEventListener('click', load);
document.getElementById('btnPrev').addEventListener('click', () => { offset = Math.max(0, offset - PAGE_SIZE); load(); });
document.getElementById('btnNext').addEventListener('click', () => { offset += PAGE_SIZE; load(); });
document.getElementById('ideFilter').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#ideFilter button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ideFilter = btn.dataset.ide || '';
  offset = 0;
  load();
});

load();
</script>
</body>
</html>

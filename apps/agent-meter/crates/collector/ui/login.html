<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, sans-serif;

  color: #e4e4ed; min-height: 100vh;

.card {

  background: #1a1a26; border: 1px solid #2a2a3a; color: #e4e4ed;
  font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none;
}
.btn-github:hover { background: #22222e; border-color: #6366f1; }
.btn-github svg { width: 18px; height: 18px; }
.foot { margin-top: 24px; font-size: 11px; color: #646478; }
.foot a { color: #818cf8; text-decoration: none; }

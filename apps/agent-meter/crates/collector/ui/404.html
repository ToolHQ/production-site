<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>404 · agent-meter</title>

<link rel="icon" type="image/svg+xml" href="/_static/favicon.svg">
<link rel="stylesheet" href="/_static/tokens.css">
<link rel="stylesheet" href="/_static/app.css">
</head>
<body>
<svg style="display:none"><use href="/_static/icons.svg"/></svg>

<div class="am-app">

      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">

        <a href="/conversations" class="am-btn am-btn-secondary"><svg class="am-icon"><use href="/_static/icons.svg#i-message"/></svg>Conversations</a>

    </div>
  </main>
  <footer class="am-footer" id="amFooter"></footer>

<script src="/_static/app.js"></script>
<script>amShell({active:'', breadcrumb:'Not found'});</script>

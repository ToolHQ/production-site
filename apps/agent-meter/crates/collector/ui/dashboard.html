<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agent-meter dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #0a0a0f;
  --bg-surface: #12121a;
  --bg-elevated: #1a1a26;
  --bg-hover: #22222e;
  --border: #2a2a3a;
  --text-primary: #e4e4ed;
  --text-secondary: #9494a8;
  --text-muted: #646478;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --radius: 8px;
  --radius-lg: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 1360px;
  margin: 0 auto;
  padding: 24px;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

header h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header .subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

.health-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
}

.health-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  transition: background 0.3s ease;
}

.health-dot.ok { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.4); }
.health-dot.err { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.4); }
.health-dot.loading { background: var(--yellow); animation: pulse 1s ease-in-out infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.kpi-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  transition: all 0.2s ease;
}

.kpi-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(99,102,241,0.1);
}

.kpi-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}

.kpi-value {
  font-size: 26px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
}

.time-filter {
  display: flex;
  gap: 4px;
  padding: 3px;
  background: var(--bg-surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.time-btn {
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.15s ease;
  background: transparent;
  color: var(--text-secondary);
}

.time-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.time-btn.active { background: var(--accent); color: #fff; }

.sparkline-section {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 24px;
}

.sparkline-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.sparkline-header h3 {
  font-size: 14px;
  font-weight: 600;
}

.sparkline-header .stats {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  gap: 16px;
}

.sparkline-svg {
  width: 100%;
  height: 80px;
}

.section {
  margin-bottom: 28px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}

.section-header h2 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}

.section-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.tabs {
  display: flex;
  gap: 4px;
  padding: 3px;
  background: var(--bg-surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.tab-btn {
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.15s ease;
  background: transparent;
  color: var(--text-secondary);
}

.tab-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.tab-btn.active { background: var(--accent); color: #fff; }

.btn-sm {
  padding: 5px 10px;
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  border: 1px solid var(--border);
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.15s ease;
  background: var(--bg-elevated);
  color: var(--text-secondary);
}

.btn-sm:hover { background: var(--bg-hover); color: var(--text-primary); }

.table-wrap {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-variant-numeric: tabular-nums;
  min-width: 600px;
}

thead {
  background: var(--bg-elevated);
}

th {
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  text-align: left;
  white-space: nowrap;
}

td {
  padding: 9px 14px;
  font-size: 13px;
  color: var(--text-secondary);
  border-top: 1px solid var(--border);
}

tbody tr { transition: background 0.15s ease; }
tbody tr:hover { background: var(--bg-hover); }

.text-green { color: var(--green); }
.text-red { color: var(--red); }
.text-yellow { color: var(--yellow); }
.font-mono { font-variant-numeric: tabular-nums; }

.empty-state {
  padding: 40px 24px;
  text-align: center;
  color: var(--text-muted);
}

.empty-state p { font-size: 14px; }
.empty-state .hint { font-size: 12px; margin-top: 6px; color: var(--text-muted); opacity: 0.6; }

.event-form {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.form-group input, .form-group select {
  width: 100%;
  padding: 7px 10px;
  font-size: 13px;
  font-family: inherit;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text-primary);
  transition: border-color 0.15s ease;
}

.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--accent);
}

.form-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.btn {
  padding: 7px 18px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }

.btn-secondary {
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

.form-result {
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-family: monospace;
  margin-top: 12px;
  display: none;
}

.form-result.success {
  display: block;
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.2);
  color: var(--green);
}

.form-result.error {
  display: block;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: var(--red);
}

.error-rate { font-variant-numeric: tabular-nums; }

@media (max-width: 768px) {
  .app { padding: 12px; }
  header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
  .section-header { flex-direction: column; align-items: flex-start; }
  .time-filter { flex-wrap: wrap; }
  th, td { padding: 6px 8px; font-size: 12px; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>agent-meter</h1>
      <div class="subtitle">Agentic AI observability &amp; FinOps collector</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div class="health-badge" id="healthBadge">
        <span class="health-dot loading" id="healthDot"></span>
        <span id="healthText">checking...</span>
      </div>
    </div>
  </header>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Total Tool Calls</div>
      <div class="kpi-value" id="totalCalls">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total Tokens</div>
      <div class="kpi-value" id="totalTokens">—</div>
      <div id="tokenBreakdown" style="font-size:11px;color:var(--text-muted);margin-top:4px"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Avg Tokens / Call</div>
      <div class="kpi-value" id="avgTokens">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Cached Tokens</div>
      <div class="kpi-value" id="cachedTokens">—</div>
      <div id="cacheRatio" style="font-size:11px;color:var(--text-muted);margin-top:4px"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Error Rate</div>
      <div class="kpi-value" id="errorRate">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">MCP Servers</div>
      <div class="kpi-value" id="totalMcpServers">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Period</div>
      <div class="kpi-value" id="periodRange" style="font-size:13px;font-weight:400;color:var(--text-secondary)">—</div>
    </div>
    <div class="kpi-card" style="border-left:2px solid var(--accent);cursor:pointer" id="lastEventCard" title="Click to open Events tab">
      <div class="kpi-label">Last Event</div>
      <div class="kpi-value" id="lastEventTime" style="font-size:13px;font-weight:500">—</div>
      <div id="lastEventTool" style="font-size:11px;color:var(--text-muted);margin-top:2px">waiting...</div>
    </div>
  </div>

  <div class="sparkline-section" id="sparklineSection">
    <div class="sparkline-header">
      <h3>Calls Over Time</h3>
      <div class="stats">
        <span id="sparkTotal">—</span>
        <span id="sparkErrors">—</span>
      </div>
    </div>
    <div class="time-filter" id="timeFilter">
      <button class="time-btn" data-range="1h">1h</button>
      <button class="time-btn active" data-range="6h">6h</button>
      <button class="time-btn" data-range="24h">24h</button>
      <button class="time-btn" data-range="7d">7d</button>
      <button class="time-btn" data-range="30d">30d</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center">
      <select id="filterIde" style="font-size:12px;font-family:inherit;background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border);border-radius:5px;padding:4px 8px">
        <option value="">all IDEs</option>
        <option value="opencode">OpenCode</option>
        <option value="cursor">Cursor</option>
        <option value="copilot-vscode">Copilot/VSCode</option>
        <option value="antigravity">Antigravity</option>
        <option value="rust-rover">Codex/Rust Rover</option>
        <option value="other">Other</option>
      </select>
      <select id="filterAgent" style="font-size:12px;font-family:inherit;background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border);border-radius:5px;padding:4px 8px">
        <option value="">all agents</option>
        <option value="opencode">OpenCode</option>
        <option value="cursor">Cursor</option>
        <option value="copilot">Copilot</option>
        <option value="antigravity">Antigravity</option>
        <option value="codex">Codex</option>
      </select>
      <select id="filterModel" style="font-size:12px;font-family:inherit;background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border);border-radius:5px;padding:4px 8px">
        <option value="">all models</option>
      </select>
      <button id="btnClearFilters" style="font-size:11px;font-family:inherit;padding:4px 10px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:5px;cursor:pointer" title="Clear all filters">✕ clear</button>
    </div>
    <svg class="sparkline-svg" id="sparklineSvg" preserveAspectRatio="none">
      <rect width="100%" height="100%" fill="var(--bg-elevated)" rx="6"/>
    </svg>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>Reports</h2>
      <div class="section-actions">
        <div class="tabs">
          <button class="tab-btn active" data-tab="tools">Top Tools</button>
          <button class="tab-btn" data-tab="tasks">Top Tasks</button>
          <button class="tab-btn" data-tab="servers">Top MCP Servers</button>
          <button class="tab-btn" data-tab="events">Events</button>
        </div>
        <button class="btn-sm" id="btnExportCsv" title="Export as CSV">⬇ CSV</button>
      </div>
    </div>
    <div class="table-wrap" id="reportContent">
      <div class="empty-state"><p>No data yet</p><p class="hint">Send an event using the form below</p></div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <h2>Send Test Event</h2>
    </div>
    <div class="event-form" id="eventForm">
      <div class="form-grid">
        <div class="form-group">
          <label>Tool Name</label>
          <input type="text" id="fToolName" value="read_file">
        </div>
        <div class="form-group">
          <label>MCP Server</label>
          <input type="text" id="fMcpServer" value="filesystem">
        </div>
        <div class="form-group">
          <label>Agent</label>
          <input type="text" id="fAgent" value="opencode">
        </div>
        <div class="form-group">
          <label>Skill</label>
          <input type="text" id="fSkill" value="dev">
        </div>
        <div class="form-group">
          <label>IDE</label>
          <select id="fIde">
            <option value="opencode">OpenCode</option>
            <option value="cursor">Cursor</option>
            <option value="copilot">Copilot</option>
            <option value="claude-code">Claude Code</option>
            <option value="antigravity">Antigravity</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Request Bytes</label>
          <input type="number" id="fReqBytes" value="1200" min="0">
        </div>
        <div class="form-group">
          <label>Response Bytes</label>
          <input type="number" id="fResBytes" value="30000" min="0">
        </div>
        <div class="form-group">
          <label>OK?</label>
          <select id="fOk"><option value="true">Yes</option><option value="false">No</option></select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btnSend">Send Event</button>
        <button class="btn btn-secondary" id="btnSendRandom">Send Random</button>
        <span style="font-size:12px;color:var(--text-muted)" id="sendStatus"></span>
      </div>
      <div class="form-result" id="formResult"></div>
    </div>
  </div>
</div>

<script>
const BASE = '';
const state = {
  currentTab: 'tools', data: null, timeRange: '6h', timeData: null,
  filterIde: '', filterAgent: '', filterModel: '',
  lastEventAt: null, eventsTimer: null,
};

function isoBefore(ago) {
  return new Date(Date.now() - ago).toISOString();
}

const RANGE_MS = {
  '1h': 3600_000, '6h': 21600_000, '24h': 86400_000,
  '7d': 604800_000, '30d': 2592000_000,
};

function bucketFor(range) {
  if (range === '1h' || range === '6h') return 'minute';
  if (range === '24h') return 'hour';
  return 'day';
}

function nowISO() { return new Date().toISOString(); }

async function checkHealth() {
  const dot = document.getElementById('healthDot');
  const text = document.getElementById('healthText');
  try {
    const r = await fetch(BASE + '/health');
    if (r.ok) { dot.className = 'health-dot ok'; text.textContent = 'Healthy'; }
    else { dot.className = 'health-dot err'; text.textContent = 'Unhealthy'; }
  } catch {
    dot.className = 'health-dot err'; text.textContent = 'Offline';
  }
}

function getFilters() {
  const ide = document.getElementById('filterIde').value;
  const agent = document.getElementById('filterAgent').value;
  const model = document.getElementById('filterModel').value;
  state.filterIde = ide; state.filterAgent = agent; state.filterModel = model;
  return { ide, agent, model };
}

function buildQuery(extra = {}) {
  const range = state.timeRange;
  const from = isoBefore(RANGE_MS[range]);
  const to = nowISO();
  const f = getFilters();
  let q = `?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
  if (f.ide) q += `&ide=${f.ide}`;
  if (f.agent) q += `&agent=${f.agent}`;
  // model filter not yet supported server-side on top-tools/tasks — skip for reports
  for (const [k, v] of Object.entries(extra)) if (v) q += `&${k}=${encodeURIComponent(v)}`;
  return q;
}

async function fetchReports() {
  const q = buildQuery();
  try {
    const [tools, tasks, servers] = await Promise.all([
      fetch(BASE + '/reports/top-tools' + q).then(r => r.json()),
      fetch(BASE + '/reports/top-tasks' + q).then(r => r.json()),
      fetch(BASE + '/reports/top-mcp-servers' + q).then(r => r.json()),
    ]);
    state.data = { tools, tasks, servers };
    updateModelFilter(tools);
    renderKPIs();
    if (state.currentTab !== 'events') renderTab(state.currentTab);
  } catch { /* noop */ }
}

async function fetchSparkline() {
  const b = bucketFor(state.timeRange);
  const q = buildQuery({ bucket: b });
  try {
    const data = await fetch(BASE + '/reports/calls-over-time' + q).then(r => r.json());
    state.timeData = data;
    renderSparkline(data);
  } catch { /* noop */ }
}

function updateModelFilter(tools) {
  const sel = document.getElementById('filterModel');
  const current = sel.value;
  const models = [...new Set((tools || []).map(t => t.top_model).filter(Boolean))];
  sel.innerHTML = '<option value="">all models</option>' +
    models.map(m => `<option value="${m}"${m === current ? ' selected' : ''}>${m}</option>`).join('');
}

function renderSparkline(data) {
  const svg = document.getElementById('sparklineSvg');
  if (!data || data.length === 0) {
    svg.innerHTML = '<rect width="100%" height="100%" fill="var(--bg-elevated)" rx="6"/>' +
      '<text x="50%" y="50%" text-anchor="middle" fill="var(--text-muted)" font-size="13" font-family="Inter,sans-serif">No data</text>';
    document.getElementById('sparkTotal').textContent = '0 calls';
    document.getElementById('sparkErrors').textContent = '0 errors';
    return;
  }

  const w = svg.clientWidth || 800;
  const h = 80;
  const pad = { top: 8, bottom: 16, left: 4, right: 4 };
  const pw = w - pad.left - pad.right;
  const ph = h - pad.top - pad.bottom;

  const maxCalls = Math.max(...data.map(d => d.calls), 1);
  const totalCalls = data.reduce((s, d) => s + d.calls, 0);
  const totalErrors = data.reduce((s, d) => s + d.errors, 0);

  document.getElementById('sparkTotal').textContent = formatNum(totalCalls) + ' calls';
  document.getElementById('sparkErrors').textContent = formatNum(totalErrors) + ' errors';

  const points = data.map((d, i) => {
    const x = pad.left + (i / Math.max(data.length - 1, 1)) * pw;
    const y = pad.top + ph - (d.calls / maxCalls) * ph;
    return `${x},${y}`;
  }).join(' ');

  // area fill
  const areaPoints = `${pad.left},${pad.top + ph} ${points} ${pad.left + pw},${pad.top + ph}`;

  // x-axis labels — show first, middle, last timestamp
  const labels = [];
  if (data.length > 0) {
    const indices = [0, Math.floor(data.length / 2), data.length - 1];
    for (const idx of indices) {
      const d = new Date(data[idx].bucket);
      const label = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const x = pad.left + (idx / Math.max(data.length - 1, 1)) * pw;
      labels.push(`<text x="${x}" y="${h - 4}" text-anchor="${idx === 0 ? 'start' : idx === data.length - 1 ? 'end' : 'middle'}" fill="var(--text-muted)" font-size="10" font-family="Inter,sans-serif">${label}</text>`);
    }
  }

  svg.innerHTML = `
    <rect width="100%" height="100%" fill="var(--bg-elevated)" rx="6"/>
    <polygon points="${areaPoints}" fill="rgba(99,102,241,0.12)"/>
    <polyline points="${points}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${labels.join('')}
  `;
}

function renderKPIs() {
  const d = state.data;
  if (!d) return;
  // filter out llm_chat from tool counts for the tool-specific KPIs
  const tools = (d.tools || []).filter(t => t.tool_name !== 'llm_chat');
  const allTools = d.tools || [];
  const servers = d.servers || [];

  const totalCalls = tools.reduce((s, t) => s + Number(t.calls || 0), 0);
  const totalTokens = allTools.reduce((s, t) => s + Number(t.total_estimated_tokens || 0), 0);
  const totalIn = allTools.reduce((s, t) => s + Number((t.avg_input_tokens || 0) * (t.calls || 0)), 0);
  const totalOut = allTools.reduce((s, t) => s + Number((t.avg_output_tokens || 0) * (t.calls || 0)), 0);
  const totalCached = allTools.reduce((s, t) => s + Number(t.cached_tokens_total || 0), 0);
  const avgTokens = totalCalls > 0 ? Math.round(totalTokens / totalCalls) : 0;
  const totalMcpServers = servers.length;

  let errRate = 0;
  if (servers.length > 0) {
    const totalErr = servers.reduce((s, t) => {
      return s + (t.error_rate != null ? Number(t.error_rate) * Number(t.calls || 0) : 0);
    }, 0);
    const totalC = servers.reduce((s, t) => s + Number(t.calls || 0), 0);
    errRate = totalC > 0 ? ((totalErr / totalC) * 100).toFixed(1) : 0;
  }

  document.getElementById('totalCalls').textContent = formatNum(totalCalls);
  document.getElementById('totalTokens').textContent = formatNum(totalTokens);
  const breakdown = document.getElementById('tokenBreakdown');
  if (totalIn > 0 || totalOut > 0) {
    breakdown.textContent = `in: ${formatNum(Math.round(totalIn))} · out: ${formatNum(Math.round(totalOut))}`;
  } else { breakdown.textContent = ''; }
  document.getElementById('cachedTokens').textContent = formatNum(totalCached);
  const cacheRatio = document.getElementById('cacheRatio');
  if (totalTokens > 0 && totalCached > 0) {
    cacheRatio.textContent = `${((totalCached / totalTokens) * 100).toFixed(1)}% cache hit`;
  } else { cacheRatio.textContent = ''; }
  document.getElementById('avgTokens').textContent = formatNum(avgTokens);
  document.getElementById('totalMcpServers').textContent = totalMcpServers;
  const erEl = document.getElementById('errorRate');
  erEl.textContent = errRate + '%';
  erEl.className = 'kpi-value ' + (errRate > 10 ? 'text-red' : errRate > 5 ? 'text-yellow' : '');
  document.getElementById('periodRange').textContent = state.timeRange;
}

function formatNum(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'k';
  return String(n);
}

function renderTab(tab) {
  state.currentTab = tab;
  const container = document.getElementById('reportContent');

  // Events tab has its own async fetch — handle separately
  if (tab === 'events') {
    evState.offset = 0;
    renderEventsTab(true);
    return;
  }

  const data = state.data ? state.data[tab] : null;

  if (!data || data.length === 0) {
    container.innerHTML = `<div class="empty-state"><p>No data yet</p><p class="hint">Send an event using the form below</p></div>`;
    return;
  }

  if (tab === 'tools') {
    container.innerHTML = buildTable(
      ['Type', 'Tool / Operation', 'Provider', 'Calls', 'Avg In ↑', 'Avg Out ↓', 'Cached ♻', 'Top Model', 'Avg Duration', 'Errors'],
      data,
      t => {
        const isChat = t.tool_name === 'llm_chat';
        const typeTag = isChat
          ? `<span style="font-size:10px;padding:1px 5px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:3px;color:var(--accent);white-space:nowrap">💬 LLM</span>`
          : `<span style="font-size:10px;padding:1px 5px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:3px;color:var(--green);white-space:nowrap">🔧 tool</span>`;
        return [
          typeTag,
          `<strong>${t.tool_name}</strong>`,
          t.mcp_server || '—',
          formatNum(t.calls),
          t.avg_input_tokens ? formatNum(Math.round(t.avg_input_tokens)) : '—',
          t.avg_output_tokens ? formatNum(Math.round(t.avg_output_tokens)) : '—',
          t.cached_tokens_total ? `<span class="text-green">${formatNum(t.cached_tokens_total)}</span>` : '—',
          t.top_model ? `<span style="font-size:11px;padding:2px 6px;background:var(--bg-elevated);border-radius:4px;color:var(--accent)">${t.top_model}</span>` : '—',
          t.avg_duration_ms ? Number(t.avg_duration_ms).toFixed(0) + 'ms' : '—',
          `<span class="${t.errors > 0 ? 'text-red' : ''}">${t.errors || 0}</span>`,
        ];
      }
    );
  } else if (tab === 'tasks') {
    container.innerHTML = buildTable(
      ['Task ID', 'Tool Calls', 'Total Tokens', 'Total Duration', 'Errors', 'Distinct Tools'],
      data,
      t => [
        t.task_id, formatNum(t.tool_calls), formatNum(t.total_estimated_tokens),
        t.total_duration_ms ? formatNum(t.total_duration_ms) + 'ms' : '—',
        `<span class="${t.errors > 0 ? 'text-red' : ''}">${t.errors}</span>`,
        t.distinct_tools
      ]
    );
  } else if (tab === 'servers') {
    container.innerHTML = buildTable(
      ['MCP Server', 'Calls', 'Total Tokens', 'Avg Resp Bytes', 'Error Rate'],
      data,
      t => [
        t.mcp_server || '—', formatNum(t.calls), formatNum(t.total_estimated_tokens),
        t.avg_response_bytes ? formatNum(Math.round(t.avg_response_bytes)) : '—',
        t.error_rate != null ? (Number(t.error_rate) * 100).toFixed(1) + '%' : '—'
      ]
    );
  } else if (tab === 'events') {
    renderEventsTab(true);
  }
}

function buildTable(headers, rows, cellFn, tbodyId) {
  let html = '<table><thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead>';
  html += `<tbody${tbodyId ? ` id="${tbodyId}"` : ''}>`;
  for (const row of rows) {
    const cells = cellFn(row);
    html += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

function buildTbodyRows(rows, cellFn) {
  let html = '';
  for (const row of rows) {
    const cells = cellFn(row);
    html += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
  }
  return html;
}

// ── Events feed ──────────────────────────────────────────────────
const evState = { offset: 0, limit: 50, convFilter: '' };

async function fetchEvents() {
  const range = state.timeRange;
  const from = isoBefore(RANGE_MS[range]);
  const to = nowISO();
  const f = getFilters();
  let q = `?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&limit=${evState.limit}&offset=${evState.offset}`;
  if (f.ide) q += `&ide=${f.ide}`;
  if (f.agent) q += `&agent=${f.agent}`;
  if (f.model) q += `&model=${encodeURIComponent(f.model)}`;
  if (evState.convFilter) q += `&conversation_id=${encodeURIComponent(evState.convFilter)}`;
  const data = await fetch(BASE + '/reports/events' + q).then(r => r.json());
  // update last event KPI
  if (data && data.length > 0) {
    const ev = data[0];
    state.lastEventAt = ev.started_at;
    document.getElementById('lastEventTime').textContent = relativeTime(ev.started_at);
    document.getElementById('lastEventTool').textContent = ev.tool_name + (ev.model ? ` · ${ev.model}` : '');
  }
  return data;
}

function relativeTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 5000) return 'just now';
  if (diff < 60000) return Math.floor(diff / 1000) + 's ago';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return new Date(iso).toLocaleDateString();
}

function startEventsAutoRefresh() {
  stopEventsAutoRefresh();
  state.eventsTimer = setInterval(() => {
    if (state.currentTab === 'events' && evState.offset === 0) renderEventsTab();
  }, 5000);
}

function stopEventsAutoRefresh() {
  if (state.eventsTimer) { clearInterval(state.eventsTimer); state.eventsTimer = null; }
}

async function renderEventsTab(forceFullRender) {
  const container = document.getElementById('reportContent');
  const existingTbody = document.getElementById('eventsTableBody');
  // Only flash Loading on first render; on auto-refresh, update in-place
  if (!existingTbody || forceFullRender) {
    container.innerHTML = '<div class="empty-state"><p>Loading…</p></div>';
  }
  try {
    const rows = await fetchEvents();
    if (!rows || rows.length === 0) {
      container.innerHTML = `
        ${renderEventsFilter()}
        <div class="empty-state"><p>No events found</p><p class="hint">Use the form below to send a test event</p></div>`;
      return;
    }

    evState.rows = rows; // cache for CSV export
    const rowFn = r => {
      const isChat = r.tool_name === 'llm_chat';
      const typeTag = isChat
        ? `<span style="font-size:10px;padding:1px 5px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);border-radius:3px;color:var(--accent)">💬 LLM</span>`
        : `<span style="font-size:10px;padding:1px 5px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:3px;color:var(--green)">🔧 tool</span>`;
      const convSnippet = r.conversation_id
        ? `<span style="font-size:10px;font-family:monospace;color:var(--text-muted)" title="${r.conversation_id}">${r.conversation_id.substring(0,8)}…</span>`
        : '—';
      const promptSnippet = r.user_prompt
        ? `<span style="font-size:11px;color:var(--text-muted);cursor:default;max-width:200px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:bottom" title="${r.user_prompt.replace(/"/g, '&quot;')}">${r.user_prompt.substring(0, 50)}${r.user_prompt.length > 50 ? '…' : ''}</span>`
        : '<span style="color:var(--text-muted);font-size:10px">—</span>';
      return [
        `<span style="font-size:11px;white-space:nowrap;color:var(--text-muted)" title="${r.started_at}">${relativeTime(r.started_at)}</span>`,
        typeTag,
        `<strong style="${isChat ? 'color:var(--accent-hover)' : ''}">${r.tool_name}</strong>`,
        r.model ? `<span style="font-size:11px;padding:2px 6px;background:var(--bg-elevated);border-radius:4px;color:var(--accent)">${r.model}</span>` : '—',
        r.estimated_input_tokens ? formatNum(r.estimated_input_tokens) : '—',
        r.estimated_output_tokens ? formatNum(r.estimated_output_tokens) : '—',
        r.cached_tokens ? `<span class="text-green">${formatNum(r.cached_tokens)}</span>` : '—',
        r.duration_ms + 'ms',
        r.ok ? '<span class="text-green">✓ ok</span>' : '<span class="text-red">✗ err</span>',
        r.agent || '—',
        convSnippet,
        `<span style="font-size:11px">${r.ide || '—'}</span>`,
        r.client_ip ? `<span style="font-size:10px;color:var(--text-muted)">${r.client_ip.split(',')[0].trim().substring(0, 15)}</span>` : '—',
        promptSnippet,
      ];
    };

    // In-place update when tbody already rendered (no flicker)
    const tbody = document.getElementById('eventsTableBody');
    if (tbody && !forceFullRender) {
      tbody.innerHTML = buildTbodyRows(rows, rowFn);
      // Update live indicator text only
      const liveEl = document.getElementById('evLiveIndicator');
      if (liveEl) {
        liveEl.innerHTML = state.eventsTimer
          ? `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--green)"><span style="width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1s ease-in-out infinite"></span>live</span>`
          : `<span style="font-size:11px;color:var(--text-muted)">paused</span>`;
      }
      // Update pagination
      const pagEl = document.getElementById('eventsPagination');
      if (pagEl) pagEl.innerHTML = renderEventsPaginationInner(rows.length);
      return;
    }

    const table = buildTable(
      ['When', 'Type', 'Tool / Op', 'Model', 'In ↑', 'Out ↓', 'Cached ♻', 'Duration', 'Status', 'Agent', 'Conv ID', 'IDE', 'IP', 'Prompt'],
      rows, rowFn, 'eventsTableBody'
    );
    container.innerHTML = renderEventsFilter() + table + renderEventsPagination(rows.length);
    attachEventsPaginationListeners();
    attachEventsFilterListeners();
  } catch(e) {
    container.innerHTML = `<div class="empty-state"><p class="text-red">Error: ${e.message}</p></div>`;
  }
}

function renderEventsFilter() {
  const liveHtml = state.eventsTimer
    ? `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--green)"><span style="width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1s ease-in-out infinite"></span>live</span>`
    : `<span style="font-size:11px;color:var(--text-muted)">paused</span>`;
  return `<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <span id="evLiveIndicator">${liveHtml}</span>
    <label style="font-size:11px;color:var(--text-muted)">Conversation:</label>
    <input id="evConvFilter" type="text" placeholder="conversation_id" value="${evState.convFilter}"
      style="font-size:12px;font-family:inherit;background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border);border-radius:5px;padding:4px 8px;width:200px">
    <button id="evFilterBtn" class="btn-sm">Filter</button>
    <button id="evResetBtn" class="btn-sm">Reset</button>
    <button id="evLiveBtn" class="btn-sm" style="margin-left:auto">${state.eventsTimer ? '⏸ Pause' : '▶ Live'}</button>
  </div>`;
}

function renderEventsPaginationInner(count) {
  const hasPrev = evState.offset > 0;
  const hasNext = count === evState.limit;
  return `<button id="evPrev" class="btn-sm" ${hasPrev ? '' : 'disabled style="opacity:.4"'}>← Prev</button>
    <span>offset ${evState.offset} – ${evState.offset + count}</span>
    <button id="evNext" class="btn-sm" ${hasNext ? '' : 'disabled style="opacity:.4"'}>Next →</button>`;
}

function renderEventsPagination(count) {
  return `<div id="eventsPagination" style="padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;font-size:12px;color:var(--text-muted)">
    ${renderEventsPaginationInner(count)}
  </div>`;
}

function attachEventsPaginationListeners() {
  document.getElementById('evPrev')?.addEventListener('click', () => {
    evState.offset = Math.max(0, evState.offset - evState.limit);
    renderEventsTab(true);
  });
  document.getElementById('evNext')?.addEventListener('click', () => {
    evState.offset += evState.limit;
    renderEventsTab(true);
  });
}

function attachEventsFilterListeners() {
  document.getElementById('evFilterBtn')?.addEventListener('click', () => {
    evState.convFilter = document.getElementById('evConvFilter').value.trim();
    evState.offset = 0;
    renderEventsTab(true);
  });
  document.getElementById('evResetBtn')?.addEventListener('click', () => {
    evState.convFilter = '';
    evState.offset = 0;
    renderEventsTab(true);
  });
  document.getElementById('evLiveBtn')?.addEventListener('click', () => {
    if (state.eventsTimer) stopEventsAutoRefresh();
    else { evState.offset = 0; startEventsAutoRefresh(); }
    renderEventsTab(true);
  });
}

function exportCsv() {
  const tab = state.currentTab;
  // Events tab uses evState.rows (fetched separately); other tabs use state.data
  const data = tab === 'events' ? null : (state.data ? state.data[tab] : null);
  if (tab !== 'events' && (!data || data.length === 0)) return;

  let headers, rows;

  if (tab === 'tools') {
    headers = ['Tool', 'MCP Server', 'Calls', 'Total Tokens', 'Avg In', 'Avg Out', 'Cached', 'Top Model', 'Avg Duration (ms)', 'Errors'];
    rows = data.map(t => [t.tool_name, t.mcp_server || '', t.calls, t.total_estimated_tokens,
      Math.round(t.avg_input_tokens || 0), Math.round(t.avg_output_tokens || 0),
      t.cached_tokens_total || 0, t.top_model || '',
      (t.avg_duration_ms || 0).toFixed(0), t.errors]);
  } else if (tab === 'tasks') {
    headers = ['Task ID', 'Tool Calls', 'Total Tokens', 'Total Duration (ms)', 'Errors', 'Distinct Tools'];
    rows = data.map(t => [t.task_id, t.tool_calls, t.total_estimated_tokens, t.total_duration_ms || 0, t.errors, t.distinct_tools]);
  } else if (tab === 'events') {
    const evRows = evState.rows || [];
    if (evRows.length === 0) return;
    headers = ['When', 'Type', 'Tool / Op', 'Model', 'In', 'Out', 'Cached', 'Duration (ms)', 'Status', 'Agent', 'Conv ID', 'IDE', 'IP', 'Prompt'];
    rows = evRows.map(r => [
      r.started_at, r.tool_name === 'llm_chat' ? 'LLM' : 'tool',
      r.tool_name, r.model || '', r.estimated_input_tokens || '', r.estimated_output_tokens || '',
      r.cached_tokens || '', r.duration_ms, r.ok ? 'ok' : 'err',
      r.agent || '', r.conversation_id || '', r.ide || '', r.client_ip || '', r.user_prompt || ''
    ]);
  } else {
    headers = ['MCP Server', 'Calls', 'Total Tokens', 'Avg Resp Bytes', 'Error Rate (%)'];
    rows = data.map(t => [t.mcp_server || '', t.calls, t.total_estimated_tokens, Math.round(t.avg_response_bytes || 0), t.error_rate != null ? (Number(t.error_rate) * 100).toFixed(1) : '']);
  }

  let csv = headers.join(',') + '\n';
  csv += rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `agent-meter-${tab}-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function buildEvent(overrides) {
  const now = new Date();
  const ended = new Date(now.getTime() + 1000);
  return {
    tool_name: document.getElementById('fToolName').value || 'read_file',
    mcp_server: document.getElementById('fMcpServer').value || 'filesystem',
    agent: document.getElementById('fAgent').value || 'opencode',
    skill: document.getElementById('fSkill').value || 'dev',
    ide: document.getElementById('fIde').value,
    request_bytes: parseInt(document.getElementById('fReqBytes').value) || 1200,
    response_bytes: parseInt(document.getElementById('fResBytes').value) || 30000,
    ok: document.getElementById('fOk').value === 'true',
    started_at: now.toISOString(),
    ended_at: ended.toISOString(),
    repo: 'agent-meter',
    branch: 'main',
    task_id: 'TASK-' + String(Math.floor(Math.random() * 900) + 100),
    request_sha256: 'abc' + Math.random().toString(36).slice(2, 10),
    response_sha256: 'def' + Math.random().toString(36).slice(2, 10),
    metadata: { source: 'dashboard' },
    ...overrides,
  };
}

async function sendEvent(evt) {
  const status = document.getElementById('sendStatus');
  const result = document.getElementById('formResult');
  status.textContent = 'sending...';
  result.className = 'form-result';
  result.style.display = 'none';

  try {
    const r = await fetch(BASE + '/events/tool-call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(evt),
    });
    const data = await r.json();
    if (r.ok) {
      result.className = 'form-result success';
      result.textContent = `OK — event_id: ${data.event_id}, tokens: ${data.estimated_total_tokens}`;
      status.textContent = 'done';
      refreshAll();
    } else {
      result.className = 'form-result error';
      result.textContent = `Error ${r.status}: ${data.error || JSON.stringify(data)}`;
      status.textContent = 'failed';
    }
  } catch (e) {
    result.className = 'form-result error';
    result.textContent = `Network error: ${e.message}`;
    status.textContent = 'failed';
  }
  result.style.display = 'block';
}

function refreshAll() {
  fetchReports();
  fetchSparkline();
}

  checkHealth();
  refreshAll();
  setInterval(checkHealth, 15000);
  setInterval(fetchReports, 30000);
  setInterval(fetchSparkline, 15000);

  // tab switching

      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));

    const agents = ['opencode', 'cursor', 'claude-code', 'copilot', 'antigravity'];

      tool_name: tools[Math.floor(Math.random() * tools.length)],
      mcp_server: servers[Math.floor(Math.random() * servers.length)],
      agent: agents[Math.floor(Math.random() * agents.length)],
      skill: skills[Math.floor(Math.random() * skills.length)],
      request_bytes: Math.floor(Math.random() * 50000) + 100,
      response_bytes: Math.floor(Math.random() * 200000) + 1000,
      ok: Math.random() > 0.15,
    }));
  });

  // filters
  document.getElementById('filterIde').addEventListener('change', refreshAll);
  document.getElementById('filterAgent').addEventListener('change', refreshAll);
  document.getElementById('filterModel').addEventListener('change', refreshAll);
  document.getElementById('btnClearFilters').addEventListener('click', () => {
    document.getElementById('filterIde').value = '';
    document.getElementById('filterAgent').value = '';
    document.getElementById('filterModel').value = '';
    refreshAll();
  });

  // last event card → switch to Events tab
  document.getElementById('lastEventCard').addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === 'events');
    });
    renderTab('events');
    startEventsAutoRefresh();
  });

  // update relative times every 30s
  setInterval(() => {
    if (state.lastEventAt) {
      document.getElementById('lastEventTime').textContent = relativeTime(state.lastEventAt);
    }
  }, 30000);

  // CSV export
  document.getElementById('btnExportCsv').addEventListener('click', exportCsv);
});
</script>
</body>
</html>

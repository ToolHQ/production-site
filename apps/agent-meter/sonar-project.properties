# SonarQube — agent-meter (Rust workspace)
# Used by Jenkinsfile.agent-meter-ci and local `sonar-scanner` runs.
# Project on SonarQube CE: https://sonar.ssdnodes.dnor.io/dashboard?id=agent-meter

sonar.projectKey=agent-meter
sonar.projectName=agent-meter
sonar.sourceEncoding=UTF-8

# Rust sources — all crates
sonar.sources=crates
sonar.exclusions=**/target/**,**/ui/**/*.html,**/migrations/**

# Test detection
sonar.tests=crates
sonar.test.inclusions=**/*_test.rs,**/tests/**

# Language detection hints (SonarQube CE uses file extensions)
sonar.lang.patterns.rust=**/*.rs

# Coverage — if generated via grcov/llvm-cov, point here:
# sonar.rust.coverage.reportPaths=target/coverage/lcov.info
sonar.coverage.exclusions=**/*

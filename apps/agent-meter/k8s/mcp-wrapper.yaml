apiVersion: v1
kind: Service
metadata:
  name: agent-meter-mcp-wrapper
  namespace: default
spec:
  selector:
    app: agent-meter-mcp-wrapper
  ports:
    - port: 3001
      targetPort: 3001
      name: mcp-proxy
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-meter-mcp-wrapper
  namespace: default
  labels:
    app: agent-meter-mcp-wrapper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agent-meter-mcp-wrapper
  template:
    metadata:
      labels:
        app: agent-meter-mcp-wrapper
    spec:
      imagePullSecrets:
        - name: regsecret
      containers:
        - name: mcp-wrapper
          image: IMAGE_PLACEHOLDER
          command: ["/usr/local/bin/agent-meter-mcp-wrapper"]
          ports:
            - containerPort: 3001
          env:
            - name: MCP_WRAPPER_LISTEN
              value: "0.0.0.0:3001"
            - name: AGENT_METER_COLLECTOR_URL
              value: "http://agent-meter.default.svc.cluster.local:3000"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20

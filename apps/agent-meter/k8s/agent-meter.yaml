apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-meter-otel
  namespace: default
data:
  # Set OTEL_EXPORTER_OTLP_ENDPOINT to enable OpenTelemetry export
  # Example: http://tempo.monitoring.svc.cluster.local:4317
  otel_exporter_otlp_endpoint: ""
  otel_service_name: "agent-meter"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-meter
  namespace: default
  labels:
    app: agent-meter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agent-meter
  template:
    metadata:
      labels:
        app: agent-meter
    spec:
      imagePullSecrets:
        - name: regsecret
      containers:
        - name: collector
          image: registry.local:31444/repository/docker-repo/agent-meter:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: AGENT_METER_HOST
              value: "0.0.0.0"
            - name: AGENT_METER_PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-meter-db
                  key: url
            - name: RUST_LOG
              value: "info"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: agent-meter-otel
                  key: otel_exporter_otlp_endpoint
                  optional: true
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: agent-meter-otel
                  key: otel_service_name
                  optional: true
            - name: RUST_LOG
              value: "info"
          resources:
            limits:
              memory: 96Mi
              cpu: 100m
            requests:
              memory: 24Mi
              cpu: 10m
---
apiVersion: v1
kind: Service
metadata:
  name: agent-meter
  namespace: default
spec:
  selector:
    app: agent-meter
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-meter-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: dnor-ca-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - agent-meter.dnor.io
      secretName: agent-meter-tls
  rules:
    - host: agent-meter.dnor.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-meter
                port:
                  number: 3000

apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-meter-otel
  namespace: default
data:
  # Set OTEL_EXPORTER_OTLP_ENDPOINT to enable OpenTelemetry export
  # Example: http://tempo.monitoring.svc.cluster.local:4317
  otel_exporter_otlp_endpoint: ""
  otel_service_name: "agent-meter"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-meter
  namespace: default
  labels:
    app: agent-meter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agent-meter
  template:
    metadata:
      labels:
        app: agent-meter
    spec:
      imagePullSecrets:
        - name: regsecret
      containers:
        - name: collector
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
            - name: otlp
              containerPort: 4318
          env:
            - name: AGENT_METER_HOST
              value: "0.0.0.0"
            - name: AGENT_METER_PORT
              value: "3000"
            - name: AGENT_METER_OTLP_PORT
              value: "4318"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-meter-db
                  key: url
            - name: RUST_LOG
              value: "info"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: agent-meter-otel
                  key: otel_exporter_otlp_endpoint
                  optional: true
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: agent-meter-otel
                  key: otel_service_name
                  optional: true
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-keys
                  key: secret-key
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: stripe-keys
                  key: webhook-secret
                  optional: true
            - name: STRIPE_PRICE_PRO
              valueFrom:
                secretKeyRef:
                  name: stripe-keys
                  key: price-pro
                  optional: true
            - name: STRIPE_PRICE_TEAM
              valueFrom:
                secretKeyRef:
                  name: stripe-keys
                  key: price-team
                  optional: true
          resources:
            limits:
              memory: 96Mi
              cpu: 100m
            requests:
              memory: 24Mi
              cpu: 10m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: agent-meter
  namespace: default
spec:
  selector:
    app: agent-meter
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    - name: otlp
      port: 4318
      targetPort: 4318
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-meter-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - agent-meter.dnor.io
      secretName: agent-meter-tls
  rules:
    - host: agent-meter.dnor.io
      http:
        paths:
          - path: /v1/traces
            pathType: Prefix
            backend:
              service:
                name: agent-meter
                port:
                  number: 4318
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-meter
                port:
                  number: 3000

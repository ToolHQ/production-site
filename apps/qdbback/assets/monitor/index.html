<!DOCTYPE html>
<html>

<head>
  <title>Monitor reqs - PuddingServer</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<noscript>
  <META HTTP-EQUIV="Refresh" CONTENT="0;URL=noscript.html">
</noscript>

<body>
  <header id="topbar">
    <div class="mdc-top-app-bar" id="topbar-normal">
      <div class="mdc-top-app-bar__row">
        <section class="mdc-top-app-bar__section mdc-top-app-bar__section--align-start">
          <button class="material-icons mdc-top-app-bar__navigation-icon mdc-icon-button"
            aria-label="Open navigation menu">menu</button>
          <span class="mdc-top-app-bar__title">Monitoring</span>
        </section>
        <section class="mdc-top-app-bar__section mdc-top-app-bar__section--align-end" role="toolbar">
          <span id="languageSelected"></span>
          <button class="material-icons mdc-top-app-bar__action-item mdc-icon-button"
            aria-label="Change Language">expand_more</button>
          <button class="material-icons mdc-top-app-bar__action-item mdc-icon-button"
            aria-label="Search">search</button>
          <button class="material-icons mdc-top-app-bar__action-item mdc-icon-button"
            aria-label="Options">more_vert</button>
        </section>
      </div>
    </div>
    <ul class="mdc-list" style="background-color: white; color: black; width: 200px; z-index: 5; position: fixed; top: 64px; right: 8px; box-shadow: 0 2px 4px rgb(0 0 0 / 50%); display: none" id="languages-options">
      <li class="mdc-list-item" tabindex="0">
        <span class="mdc-list-item__ripple"></span>
        <span class="mdc-list-item__text">Português Brasileiro</span>
      </li>
      <li class="mdc-list-item" tabindex="0">
        <span class="mdc-list-item__ripple"></span>
        <span class="mdc-list-item__text">English</span>
      </li>
    </ul>
    <div style="display: none;" id="topbar-search">
      <div class="mdc-top-app-bar">
        <div class="mdc-top-app-bar__row">
          <section class="mdc-top-app-bar__section mdc-top-app-bar__section--align-start">
            <label class="mdc-text-field mdc-text-field--outlined" style="width: 100%;">
              <input type="text" class="mdc-text-field__input" style="caret-color: white; color: white;" aria-labelledby="search-label-id" id="search-input">
            </label>
          </section>
          <section class="mdc-top-app-bar__section mdc-top-app-bar__section--align-end" role="toolbar">
            <button class="material-icons mdc-top-app-bar__action-item mdc-icon-button"
              aria-label="Close">close</button>
          </section>
        </div>
      </div>
      <ul class="mdc-list" style="background-color: white; color: black; width: 300px; z-index: 5; position: fixed; top: 64px; right: 4px; box-shadow: 0 2px 4px rgb(0 0 0 / 50%); display: none" id="search-list-options">
      </ul>
    </div>
  </header>
  <main class="mdc-top-app-bar--fixed-adjust" id="app">
    <div id="requestsTable"></div>
    <div id="logsTable"></div>
    <div id="sqlTab">
      <label class="mdc-text-field mdc-text-field--textarea" style="width: 100%; height: 500px;">
        <span class="mdc-notched-outline">
          <span class="mdc-notched-outline__leading"></span>
          <span class="mdc-notched-outline__notch">
          </span>
          <span class="mdc-notched-outline__trailing"></span>
        </span>
        <textarea class="mdc-text-field__input" aria-labelledby="sql-label-id" rows="8" cols="40" maxlength="10000" id="sqlInput"></textarea>
      </label>
      <!-- <div class="mdc-text-field-helper-line">
        <div class="mdc-text-field-character-counter">0 / 140</div>
      </div> -->
      <div style="padding-top: 5px;">
        <button class="mdc-button mdc-button--raised" id="sqlButton">
          <span class="mdc-button__ripple"></span>
          <i class="material-icons mdc-button__icon" aria-hidden="true">send</i>
          <span class="mdc-button__label">Query</span>
        </button>
        <button class="mdc-button mdc-button--raised" id="sqlDownloadButton" style="padding-left: 10px;">
          <span class="mdc-button__ripple"></span>
          <i class="material-icons mdc-button__icon" aria-hidden="true">download</i>
          <span class="mdc-button__label">Download</span>
        </button>
      </div>
      <div id="sqlResultsTable"></div>
    </div>
    <div id="statusTab">
        <div class="box">
          <div class="one">
            <canvas id="myChart"></canvas>
          </div>
        <div class="two" id="statusTable"></div>
      </div>
    </div>
    <!-- <div class="mdc-chip-set" role="grid">
      <div class="mdc-chip" role="row">
        <div class="mdc-chip__ripple"></div>
        <span role="gridcell">
          <span role="button" tabindex="0" class="mdc-chip__primary-action">
            <span class="mdc-chip__text">Chip One</span>
          </span>
        </span>
      </div>
      <div class="mdc-chip" role="row">
        <div class="mdc-chip__ripple"></div>
        <span role="gridcell">
          <span role="button" tabindex="-1" class="mdc-chip__primary-action">
            <span class="mdc-chip__text">Chip Two</span>
          </span>
        </span>
      </div>
    </div> -->
  </main>
</body>

</html>

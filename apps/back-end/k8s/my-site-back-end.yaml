apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-site-back-end-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-site-back-end
  template:
    metadata:
      labels:
        app: my-site-back-end
    spec:
      imagePullSecrets:
        - name: regsecret
      containers:
        - name: my-site-back-end
          image: registry.local:31444/repository/docker-repo/my-site-back-end:1782599585
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: 128Mi
              cpu: 30m
            limits:
              memory: 384Mi  # raised from 256Mi — OOMKilled 6x (Exit 137); actual steady-state ~64Mi but spikes on startup/load
              cpu: 160m
          env:
            - name: NODE_ENV
              value: production
            - name: DB_DNORIO_POSTGRES_DEFAULT_DATABASE
              value: postgres
            - name: DB_DNORIO_POSTGRES_DEFAULT_SCHEMA
              value: public
            - name: DB_DNORIO_POSTGRES_DEFAULT_USER
              value: postgres
            - name: DB_DNORIO_POSTGRES_DEFAULT_PASS
              value: passwordinitial
            - name: DB_DNORIO_POSTGRES_DBA_DATABASE
              value: dba
            - name: DB_DNORIO_POSTGRES_DBA_SCHEMA
              value: dba_audit
            - name: DB_DNORIO_POSTGRES_DBA_USER
              value: svc_dba
            - name: DB_DNORIO_POSTGRES_DBA_PASS
              value: svc_dba_pwd
            - name: DB_DNORIO_POSTGRES_DATABASE
              value: toolhq
            - name: DB_DNORIO_POSTGRES_SCHEMA
              value: toolhq
            - name: DB_DNORIO_POSTGRES_USER
              value: svc_toolhq
            - name: DB_DNORIO_POSTGRES_PASS
              value: svc_toolhq_pwd
            - name: DB_DNORIO_POSTGRES_HOST
              value: postgres-service.postgres
            - name: DB_DNORIO_POSTGRES_PORT
              value: '5432'
            - name: LOGGER_DEBUG_PATHS
              value: '*@dnorio/db-wrapper/src/index.ts'
            - name: TOR_SERVICE
              value: torproxy-service.default.svc.cluster.local
            - name: TOR_PORT
              value: '9050'
            - name: ELASTIC_APM_LOG_LEVEL
              value: info
            - name: ELASTIC_APM_SERVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: apm-server-quickstart-apm-token
                  key: secret-token
                  optional: true # Elastic APM stack desativado (restrição CPU/RAM); reativar quando ECK for re-deployado
            - name: ELASTIC_APM_SERVER_URL
              value: https://apm-server-quickstart-apm-http.default.svc.cluster.local:8200
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: my-site-back-end-service
spec:
  selector:
    app: my-site-back-end
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: my-site-back-end-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-site-back-end-deployment
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 90
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 90

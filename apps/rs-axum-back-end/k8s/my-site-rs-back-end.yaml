apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-site-rs-back-end-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-site-rs-back-end
  template:
    metadata:
      labels:
        app: my-site-rs-back-end
    spec:
      imagePullSecrets:
        - name: regsecret
      containers:
        - name: my-site-rs-back-end
          image: registry.local:31444/repository/docker-repo/my-site-rs-back-end:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: 16Mi
              cpu: 20m
            limits:
              memory: 64Mi
              cpu: 80m
          env:
            - name: NODE_ENV
              value: production
            - name: SERVICE_NAME
              value: my-site-rs-back-end
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: my-site-rs-back-end-service
spec:
  selector:
    app: my-site-rs-back-end
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: my-site-rs-back-end-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-site-rs-back-end-deployment
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 90
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 90

# Embedding backfill catch-up — larger batches on a sparse schedule (**T-260**).
# Coexists with `ai-radar-embed` (2×/h, EMBED_BATCH_LIMIT). This job uses
# EMBED_CATCHUP_BATCH_LIMIT (default 100) every 4 hours to drain pending vectors.
# Requires `ai-radar-llm` with EMBEDDINGS_ENABLED=true, EMBEDDING_MODEL, LLM_API_KEY.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ai-radar-embed-catchup
  labels:
    app.kubernetes.io/name: ai-radar-embed-catchup
    app.kubernetes.io/component: embedder
    app.kubernetes.io/part-of: ai-radar
spec:
  schedule: "15 */4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1200
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ai-radar-embed-catchup
            app.kubernetes.io/component: embedder
            app.kubernetes.io/part-of: ai-radar
        spec:
          serviceAccountName: ai-radar-api
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: regsecret
          nodeSelector:
            kubernetes.io/arch: arm64
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: embed-catchup
              image: registry.local:31444/repository/docker-repo/my-site-ai-radar-cli:latest
              imagePullPolicy: Always
              args: ["embed"]
              envFrom:
                - secretRef:
                    name: ai-radar-llm
                    optional: true
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: ai-radar-database
                      key: DATABASE_URL
                - name: AI_RADAR_LOG_LEVEL
                  valueFrom:
                    configMapKeyRef:
                      name: ai-radar-config
                      key: AI_RADAR_LOG_LEVEL
                - name: EMBED_BATCH_LIMIT
                  valueFrom:
                    configMapKeyRef:
                      name: ai-radar-config
                      key: EMBED_CATCHUP_BATCH_LIMIT
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL

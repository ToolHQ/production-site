---
# Google Trends query pack (T-363) — edit terms without rebuilding image
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-radar-trends-config
  labels:
    app.kubernetes.io/name: ai-radar-trends-collect
    app.kubernetes.io/part-of: ai-radar
data:
  trends-queries.yaml: |
    geo: US
    time_window: now 7-d
    sleep_seconds: 3
    max_retries: 3
    queries:
      - term: Cursor AI
        topic: agents
      - term: Claude Code
        topic: agents
      - term: GitHub Copilot
        topic: agents
      - term: local LLM
        topic: models
      - term: Ollama
        topic: models
      - term: n8n automation
        topic: infra

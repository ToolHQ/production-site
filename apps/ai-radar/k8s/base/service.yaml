apiVersion: v1
kind: Service
metadata:
  name: ai-radar-api
  labels:
    app.kubernetes.io/name: ai-radar-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-radar
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-radar-api
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP

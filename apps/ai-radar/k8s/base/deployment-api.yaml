apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-radar-api
  labels:
    app.kubernetes.io/name: ai-radar-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-radar
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-radar-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-radar-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: ai-radar
    spec:
      serviceAccountName: ai-radar-api
      imagePullSecrets:
        - name: regsecret
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ai-radar-api
          image: registry.local:31444/repository/docker-repo/my-site-ai-radar-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          envFrom:
            - secretRef:
                name: ai-radar-llm
                optional: true
          env:
            - name: AI_RADAR_API_BIND
              value: 0.0.0.0:8080
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ai-radar-database
                  key: DATABASE_URL
            - name: AI_RADAR_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: ai-radar-config
                  key: AI_RADAR_LOG_LEVEL
            - name: LLM_MAX_RPM
              valueFrom:
                configMapKeyRef:
                  name: ai-radar-config
                  key: LLM_MAX_RPM
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 3
            timeoutSeconds: 3

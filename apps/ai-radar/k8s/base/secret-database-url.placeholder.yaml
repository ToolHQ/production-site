#   ?options=-csearch_path%3Dpublic
apiVersion: v1
kind: Secret
metadata:
  name: ai-radar-database
  labels:
    app.kubernetes.io/name: ai-radar-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ai-radar
type: Opaque
stringData:
  DATABASE_URL: postgres://REPLACE_USER:REPLACE_PASSWORD@REPLACE_HOST:5432/REPLACE_DB?options=-csearch_path%3Dpublic

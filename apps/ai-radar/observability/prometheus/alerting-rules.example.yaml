# AI Radar — exemplo de alertas Prometheus (T-176).
# NÃO aplicado automaticamente no cluster; copiar/adaptar para PrometheusRule ou Coroot.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ai-radar-pipeline
  namespace: ai-radar
  labels:
    app.kubernetes.io/part-of: ai-radar
spec:
  groups:
    - name: ai-radar-pipeline
      rules:
        - alert: AiRadarPendingRawItemsHigh
          expr: ai_radar_pending_raw_items{namespace="ai-radar"} > 50
          for: 2h
          labels:
            severity: warning
          annotations:
            summary: AI Radar fila de extract alta
            description: >
              Mais de 50 raw_items em status pending há 2h — verificar CronJob extract e LLM.

        - alert: AiRadarScoreFailures
          expr: increase(ai_radar_score_failed_total{namespace="ai-radar"}[1h]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: AI Radar falhas no score pass

        - alert: AiRadarCollectErrors
          expr: increase(ai_radar_errors_total{namespace="ai-radar", stage="collect"}[30m]) > 3
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: AI Radar erros repetidos no collect

        - alert: AiRadarExtractFailures
          expr: increase(ai_radar_extract_failed_total{namespace="ai-radar"}[1h]) > 5
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: AI Radar muitas falhas de extract

        # T-261 — semantic embedding backlog / low coverage (gauges from GET /metrics scrape)
        - alert: AiRadarEmbeddingsPendingHigh
          expr: ai_radar_embeddings_pending{namespace="ai-radar"} > 80
          for: 2h
          labels:
            severity: warning
          annotations:
            summary: AI Radar fila de embeddings alta
            description: >
              Mais de 80 itens extraídos sem vetor há 2h. Rodar backfill: CronJob
              ai-radar-embed-catchup ou job manual a partir de ai-radar-embed (ver README).

        - alert: AiRadarEmbeddingsCoverageLow
          expr: ai_radar_embeddings_coverage_pct{namespace="ai-radar"} < 50
          for: 4h
          labels:
            severity: warning
          annotations:
            summary: AI Radar cobertura semântica abaixo de 50%
            description: >
              Menos de metade dos itens elegíveis têm embedding há 4h. Verificar
              EMBEDDINGS_ENABLED, CronJobs embed/catchup e logs embed.coverage.

        - alert: AiRadarModelCatalogChanges
          expr: ai_radar_model_catalog_events_last_run{namespace="ai-radar"} > 0
          for: 5m
          labels:
            severity: info
          annotations:
            summary: AI Radar mudanças no catálogo OpenRouter
            description: >
              Último sync detectou novos modelos, remoções ou alteração de preço.
              Ver GET /models/catalog ou /stats.model_catalog.

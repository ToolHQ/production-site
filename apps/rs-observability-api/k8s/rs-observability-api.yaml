apiVersion: v1
kind: ServiceAccount
metadata:
  name: rs-observability-api
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rs-observability-api-read
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "endpoints"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  - apiGroups: ["longhorn.io"]
    resources: ["volumes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "persistentvolumes"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["resourcequotas", "namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rs-observability-api-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rs-observability-api-read
subjects:
  - kind: ServiceAccount
    name: rs-observability-api
    namespace: default
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rs-observability-api-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - reports.dnor.io
      secretName: reports-ingress-tls
  rules:
    - host: reports.dnor.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rs-observability-api-service
                port:
                  number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rs-observability-api-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rs-observability-api
  template:
    metadata:
      labels:
        app: rs-observability-api
    spec:
      serviceAccountName: rs-observability-api
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - k8s-node-3 # avoid saturated node (ClickHouse I/O)
      imagePullSecrets:
        - name: regsecret
      containers:
        - name: rs-observability-api
          image: registry.local:31444/repository/docker-repo/rs-observability-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: REPORTS_ROOT
              value: /opt/reports
            - name: PROMETHEUS_BASE_URL
              value: http://coroot-prometheus-server.coroot.svc.cluster.local
            # Coroot API authentication (Secret: kubectl create secret generic coroot-api-creds ...)
            - name: COROOT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: coroot-api-creds
                  key: COROOT_EMAIL
                  optional: true
            - name: COROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coroot-api-creds
                  key: COROOT_PASSWORD
                  optional: true
            - name: COROOT_BASE_URL
              value: http://coroot.coroot.svc.cluster.local:8080
            - name: COROOT_PROJECT_ID
              value: p3m78dle
            - name: SECONDARY_KUBECONFIG_PATH
              value: /etc/kubeconfigs/ssdnodes/kubeconfig
          volumeMounts:
            - name: ssdnodes-kubeconfig
              mountPath: /etc/kubeconfigs/ssdnodes
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 20
      volumes:
        - name: ssdnodes-kubeconfig
          secret:
            secretName: ssdnodes-kubeconfig
---
apiVersion: v1
kind: Service
metadata:
  name: rs-observability-api-service
  namespace: default
spec:
  selector:
    app: rs-observability-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

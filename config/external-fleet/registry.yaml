# Fonte de verdade para nós externos monitorados no Node Fleet.
# Edite via scripts/aws-fleet/provision-aws-external-node.sh ou manualmente.
# Regenerar artefatos: ./scripts/aws-fleet/generate_fleet_artifacts.py

scrape_sources:
  # IPs públicos dos nós OCI — origem do scrape Prometheus (Coroot).
  oci_k8s_public_ips:
    - 150.136.34.254 # k8s-master
    - 150.136.67.52 # k8s-node-1
    - 150.136.70.212 # k8s-node-2
    - 150.136.88.87 # k8s-node-3

defaults:
  ops_user: dnorio-fleet
  metrics_port: 9100
  ssh_key_dir: ~/.ssh

nodes:
  - id: hetzner-cax21
    provider: hetzner
    instance_host: 37.27.85.100
    instance_id: null
    fallback_name: hetzner-cax21-helsinki
    ssh_alias: hetzner-cax21-helsinki-4vcpu-8gb-ipv4
    cluster: HETZNER
    role: builder
    cpu_millicores: 4000
    memory_bytes: 8589934592
    ephemeral_storage_bytes: 85899345920
    exporter_service: hetzner-node-exporter
    bootstrap_managed: false

  - id: ssdnodes-monstro
    provider: ssdnodes
    instance_host: 104.225.218.78
    instance_id: null
    fallback_name: ssdnodes-6a12f10c9ef11
    ssh_alias: ssdnodes-monstro
    cluster: SSD-NODES
    role: dedicated
    cpu_millicores: 12000
    memory_bytes: 65004691456
    ephemeral_storage_bytes: 1268158550016
    exporter_service: ssdnodes-node-exporter
    bootstrap_managed: false

  - id: aws-ec2-fleet-01
    provider: aws
    instance_host: 3.236.249.77
    instance_id: i-0e8ca7a9b50e474a9
    fallback_name: ip-172-31-65-56
    ssh_alias: aws-ec2-fleet-01
    cluster: AWS-EC2
    role: dedicated
    cpu_millicores: 2000
    memory_bytes: 983498752
    ephemeral_storage_bytes: 8567894016
    exporter_service: aws-ec2-fleet-01-node-exporter
    bootstrap_managed: true
    aws_instance_type: t4g.micro
    aws_region: us-east-1
    honeypot: true
    threats_path: /internal/threats-summary
    timeseries_path: /internal/threats-timeseries
